<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2d3748;
    --text:#e6edf3; --dim:#8b949e; --accent:#58a6ff; --good:#3fb950; --bad:#f85149; --warn:#d29922;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  .wrap{max-width:860px;margin:0 auto;padding:24px 16px 60px}
  h1{font-size:1.6rem;letter-spacing:.5px}
  h2{font-size:1.25rem;margin-bottom:8px}
  .dim{color:var(--dim)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:22px;margin-top:16px}
  .btn{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--border);
    color:var(--text);border-radius:10px;padding:14px 16px;margin-top:10px;cursor:pointer;font-size:.95rem;line-height:1.45;transition:.15s}
  .btn:hover{border-color:var(--accent);background:#22304a}
  .btn .t{font-weight:600;display:block;margin-bottom:3px}
  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:99px;padding:3px 12px;font-size:.78rem;color:var(--dim);margin-right:6px}
  .kpis{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
  .kpi{flex:1;min-width:180px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .kpi .name{font-size:.78rem;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
  .kpi .val{font-size:1.3rem;font-weight:700;margin:4px 0}
  .bar{height:7px;background:#0a0e14;border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:99px;transition:width .5s}
  .delta{font-size:.8rem;margin-left:6px}
  .good{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)}
  .year{font-size:.85rem;color:var(--accent);font-weight:700;letter-spacing:1px}
  .outcome{border-left:3px solid var(--accent);padding:12px 16px;background:var(--panel2);border-radius:0 10px 10px 0;margin-top:14px;line-height:1.55}
  .hist{margin-top:10px;font-size:.85rem;color:var(--dim);font-style:italic;line-height:1.5}
  .center{text-align:center}
  .big{font-size:2.2rem;margin:10px 0}
  .progress{font-size:.8rem;color:var(--dim);margin-top:14px}
  .logo{font-size:2.4rem}
  p{line-height:1.6}
  .scen-text{margin-top:10px}
  .echo{margin-top:10px;padding:10px 14px;border-left:3px solid var(--warn);background:#1f1a10;border-radius:0 10px 10px 0;font-size:.88rem;line-height:1.5;color:#e3c77a}
  .voice{margin-top:10px;font-size:.9rem;color:var(--dim);border-left:2px solid var(--border);padding-left:12px;font-style:italic;line-height:1.5}
</style>
</head>

<script>
const app = document.getElementById('app');
let S = null; // game state

function clamp(v){ return Math.max(0, Math.min(100, v)); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function startScreen(){
  S = null;
  app.innerHTML = `
    <div class="center" style="margin-top:40px">
      <div class="logo">🏁</div>
      <h1>AUTOMOTIVE CEO</h1>
      <p class="dim">Strategy Game · Version 1</p>
    </div>
    <div class="card">
      <p>Two boards of directors want you. One runs a 130-year-old empire. The other runs a startup that might not survive the year. Every scenario you'll face is drawn from real events — and after each decision, you'll learn what actually happened.</p>
      <p class="dim" style="margin-top:10px">Keep your three KPIs above zero for 12 rounds. Choose wisely.</p>
      <button class="btn" onclick="offerScreen()"><span class="t">📨 Open your job offers</span></button>
    </div>`;
}

function offerScreen(){
  app.innerHTML = `<h2>Two offers on your desk</h2>` +
    ['tesla','mercedes'].map(k=>{
      const c = DATA[k];
      return `<div class="card">
        <h2 style="color:${c.color}">${c.logo} ${c.name}</h2>
        <p class="dim">${c.pitch}</p>
        <p style="margin-top:8px;font-size:.85rem"><span class="dim">Your KPIs as CEO:</span><br>${c.kpis.map(x=>`<b>${x.label}</b> — ${x.desc}`).join('<br>')}</p>
        <button class="btn" onclick="eraScreen('${k}')"><span class="t">Accept the ${c.name.split(' ')[0]} offer</span></button>
      </div>`;
    }).join('');
}

function eraScreen(co){
  const c = DATA[co];
  app.innerHTML = `<h2 style="color:${c.color}">${c.logo} ${c.name}</h2>
    <p class="dim">Choose your starting era. Each is a 12-round campaign built on what really happened.</p>` +
    Object.entries(c.eras).map(([ek,e])=>`
      <div class="card">
        <h2>${e.name} <span class="dim" style="font-weight:400">· ${e.years}</span></h2>
        <p class="dim">${e.intro}</p>
        <button class="btn" onclick="startGame('${co}','${ek}')"><span class="t">Take the helm in ${e.years.slice(0,4)}</span></button>
      </div>`).join('') +
    `<button class="btn" onclick="offerScreen()">← Back to offers</button>`;
}

function startGame(co, ek){
  const c = DATA[co], e = c.eras[ek];
  S = { co, ek, round:0, kpi:{...e.start}, log:[] };
  renderScenario();
}

function kpiBar(c){
  return `<div class="kpis">` + c.kpis.map(k=>{
    const v = S.kpi[k.key];
    const col = v>=60?'var(--good)':v>=30?'var(--warn)':'var(--bad)';
    const d = S.lastFx ? S.lastFx[k.key]||0 : 0;
    const ds = d ? `<span class="delta ${d>0?'good':'bad'}">${d>0?'+':''}${d}</span>` : '';
    return `<div class="kpi"><div class="name">${k.label}</div><div class="val">${v}${ds}</div>
      <div class="bar"><i style="width:${v}%;background:${col}"></i></div></div>`;
  }).join('') + `</div>`;
}

function renderScenario(){
  const c = DATA[S.co], e = c.eras[S.ek], sc = e.scenarios[S.round];
  app.innerHTML = `
    <div><span class="pill">${c.logo} ${c.name}</span><span class="pill">${e.name}</span><span class="pill">Round ${S.round+1} / ${e.scenarios.length}</span></div>
    ${kpiBar(c)}
    <div class="card">
      <div class="year">${sc.year}</div>
      <h2>${sc.title}</h2>
      <p class="scen-text dim">${sc.text}</p>
      ${sc.choices.map((ch,i)=>`<button class="btn" onclick="choose(${i})"><span class="t">${ch.label}</span></button>`).join('')}
    </div>`;
  S.lastFx = null;
  window.scrollTo(0,0);
}

function choose(i){
  const c = DATA[S.co], e = c.eras[S.ek], sc = e.scenarios[S.round], ch = sc.choices[i];
  for (const k in ch.fx) S.kpi[k] = clamp(S.kpi[k] + ch.fx[k]);
  S.lastFx = ch.fx;
  S.log.push({title:sc.title, choice:ch.label});
  const dead = c.kpis.find(k=>S.kpi[k.key]<=0);
  app.innerHTML = `
    <div><span class="pill">${c.logo} ${c.name}</span><span class="pill">Round ${S.round+1} / ${e.scenarios.length}</span></div>
    ${kpiBar(c)}
    <div class="card">
      <div class="year">${sc.year}</div>
      <h2>${sc.title}</h2>
      <p class="dim" style="margin-top:6px">You chose: <b style="color:var(--text)">${ch.label}</b></p>
      <div class="outcome">${ch.result}</div>
      ${ch.hist?`<div class="hist">📜 ${ch.hist}</div>`:''}
      ${dead
        ? `<button class="btn" onclick="endScreen(true,'${dead.key}')"><span class="t bad">Face the board…</span></button>`
        : (S.round+1 < e.scenarios.length
            ? `<button class="btn" onclick="S.round++;renderScenario()"><span class="t">Continue →</span></button>`
            : `<button class="btn" onclick="endScreen(false)"><span class="t">See your legacy →</span></button>`)}
    </div>`;
  window.scrollTo(0,0);
}

function endScreen(fired, deadKey){
  const c = DATA[S.co], e = c.eras[S.ek];
  const avg = Math.round(c.kpis.reduce((a,k)=>a+S.kpi[k.key],0)/3);
  let title, msg, icon;
  if (fired){
    const k = c.kpis.find(x=>x.key===deadKey);
    icon='🪦'; title='FIRED';
    msg=`Your <b>${k.label}</b> collapsed to zero. The board terminates your contract effective immediately. ${S.co==='tesla'?'Tesla files for bankruptcy protection; the EV revolution is delayed a decade.':'An emergency CEO is parachuted in from BMW. The humiliation is total.'}`;
  } else if (avg>=75){ icon='🏆'; title='LEGENDARY CEO'; msg=`Average KPI: <b>${avg}</b>. Business schools will teach your tenure for decades. ${S.co==='tesla'?"You didn't just save a company — you bent the entire industry toward electricity.":"You proved a century-old giant can dance. The three-pointed star has never shone brighter."}`; }
  else if (avg>=55){ icon='⭐'; title='RESPECTED CEO'; msg=`Average KPI: <b>${avg}</b>. A strong tenure with real wins and survivable scars. The board renews your contract; the biography sells modestly.`; }
  else if (avg>=35){ icon='😬'; title='SURVIVOR'; msg=`Average KPI: <b>${avg}</b>. You kept the lights on, barely. History will record you as a caretaker in revolutionary times.`; }
  else { icon='📉'; title='QUIETLY REPLACED'; msg=`Average KPI: <b>${avg}</b>. No single disaster, just steady decline. The press release says you're "pursuing new opportunities."`; }
  app.innerHTML = `
    <div class="center" style="margin-top:30px">
      <div class="logo">${icon}</div>
      <h1 class="big">${title}</h1>
      <p class="dim">${c.name} · ${e.name} (${e.years})</p>
    </div>
    ${kpiBar(c)}
    <div class="card"><p>${msg}</p></div>
    <div class="card">
      <h2>Your decisions</h2>
      ${S.log.map((l,i)=>`<p style="margin-top:8px;font-size:.88rem"><span class="dim">${i+1}. ${l.title}:</span> ${l.choice}</p>`).join('')}
    </div>
    <button class="btn" onclick="startScreen()"><span class="t">↻ Play again</span></button>`;
  window.scrollTo(0,0);
}

startScreen();
</script>
</body>
</html>
