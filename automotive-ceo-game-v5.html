<!DOCTYPE html>

<title>DRIVE — An Automotive CEO Saga · v5</title>
<style>
  :root{
    --night:#060A12; --blue:#58A6FF; --ice:#EAF3FF; --alloy:#9EAEBD; --amber:#F5A524; --panel:rgba(14,23,38,.8);
    --bg:#060A12; --ink:#EAF3FF; --paper:#101c2d; --paper2:#0e1726cf;
    --gold:#F5A524; --gold-dim:#b9821f; --rose:#58A6FF; --line:rgba(158,174,189,.2);
    --text:var(--ink); --dim:#9EAEBD; --accent:var(--rose);
    --good:#3ddc84; --bad:#ff6b6b; --warn:#F5A524;
    --co:#58A6FF; --co-glow:rgba(88,166,255,.16);
  }
  body.theme-tesla{ --co:#e0566a; }
  body.theme-mercedes{ --co:#9fb1c2; }
  body.theme-tata{ --co:#4d8fe6; }
  body.theme-mahindra{ --co:#e08a4d; }
  body.theme-byd{ --co:#4dc28a; }
  body.theme-toyota{ --co:#e06464; }
  body.theme-honda{ --co:#4dc2c2; }
  body.theme-gm{ --co:#9aa9bd; }
  body.theme-ford{ --co:#5b8fe6; }
  body.theme-stellantis{ --co:#b07fe0; }
  body.theme-vw{ --co:#4db4d6; }
  body.theme-bmw{ --co:#5b9ce6; }
  *{box-sizing:border-box;margin:0;padding:0}
  button:focus-visible,[role="radio"]:focus-visible,a:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  html,body{height:100%}
  body{
    background:radial-gradient(900px 560px at 84% -8%,#143867 0%,transparent 62%),
      radial-gradient(600px 440px at 4% 88%,#102b4a 0%,transparent 70%),
      var(--bg);
    color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    transition:background 1s;position:relative;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background-image:linear-gradient(rgba(88,166,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(88,166,255,.045) 1px,transparent 1px);
    background-size:46px 46px;mask-image:linear-gradient(to bottom,black,transparent 72%)}
  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:24px 14px 80px;min-height:100vh}
  h1,h2,.display{font-family:Georgia,'Times New Roman',serif;letter-spacing:-.02em}
  h1{font-size:1.9rem;font-weight:600;color:var(--ice);text-shadow:none}
  h2{font-size:1.35rem;margin-bottom:6px;color:var(--ice)}
  .dim{color:var(--dim)}
  .kicker{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);font-weight:600}

  /* screens & transitions */
  .screen{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card{background:linear-gradient(145deg,#101c2d,#0b1320);
    color:var(--ink);border:1px solid var(--line);
    border-radius:2px;padding:22px;margin-top:16px;box-shadow:0 14px 40px rgba(0,0,0,.45)}
  .card.glow{border-color:var(--co);box-shadow:inset 3px 0 var(--co),0 0 0 1px var(--co-glow),0 14px 40px rgba(0,0,0,.45)}

  .btn{display:block;width:100%;text-align:left;background:transparent;border:1px solid var(--line);
    color:var(--ice);border-radius:2px;padding:14px 16px;margin-top:10px;cursor:pointer;font-size:.95rem;
    line-height:1.5;transition:transform .12s, background .2s, border-color .2s, box-shadow .2s;font-family:inherit}
  .btn:hover{background:#58a6ff14;border-color:var(--blue);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:focus-visible{outline:2px solid var(--blue);outline-offset:3px;background:#58a6ff14}
  .btn .t{font-weight:600;display:block;margin-bottom:3px}
  .btn.ghost{background:transparent;color:var(--ice);text-align:center;border-color:var(--line)}
  .btn.primary{background:var(--blue);color:#06111f;border-color:var(--blue);font-weight:700}
  .btn.primary:hover{background:#8ac0ff}

  .pill{display:inline-block;background:var(--panel);border:1px solid var(--line);border-radius:99px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;padding:3px 12px;font-size:.7rem;letter-spacing:.04em;color:var(--alloy);margin:0 6px 6px 0}
  .pill b{color:var(--ice)}

  /* HUD */
  .hud{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .kpi{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:12px 14px;position:relative;overflow:hidden}
  .kpi .name{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.64rem;color:var(--alloy);text-transform:uppercase;letter-spacing:.1em}
  .kpi .val{font-size:1.35rem;font-weight:600;margin:3px 0;font-family:Georgia,serif;color:var(--ice)}
  .kpi.hit{animation:shake .4s}
  @keyframes shake{25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}
  .bar{height:6px;background:rgba(158,174,189,.15);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:99px;transition:width .7s cubic-bezier(.2,.7,.3,1)}
  .bar i[data-lvl="warn"]{background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.22) 0 4px,transparent 4px 8px)}
  .bar i[data-lvl="bad"]{background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.38) 0 3px,transparent 3px 6px)}
  .lvltag{font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;padding:1px 5px;border-radius:4px;margin-left:4px;border:1px solid currentColor;opacity:.85;vertical-align:1px}
  .lvltag.good{color:var(--good)} .lvltag.warn{color:var(--warn)} .lvltag.bad{color:var(--bad)}
  .delta{font-size:.78rem;margin-left:6px;font-weight:600}
  .good{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)} .goldc{color:var(--blue)}

  .stockbox{flex:1.2;min-width:190px;background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:12px 14px}
  .stockbox svg{display:block;width:100%;height:34px;margin-top:6px}
  /* Denser HUD on narrow phones (<380px) — the default 150px/190px min-widths
     force everything to stack tall on small screens; shrink the cards instead. */
  @media(max-width:380px){
    .hud{gap:6px}
    .kpi{min-width:104px;padding:9px 10px}
    .kpi .val{font-size:1.1rem}
    .stockbox{min-width:130px;padding:9px 10px}
  }

  /* ticker */
  .ticker{margin-top:14px;border:1px solid var(--line);border-radius:2px;background:#080e18c7;overflow:hidden;white-space:nowrap;position:relative}
  .ticker .inner{display:inline-block;padding:7px 0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.74rem;color:var(--alloy);animation:tick 28s linear infinite;padding-left:100%}
  @keyframes tick{to{transform:translateX(-100%)}}
  .ticker b{color:var(--blue);font-weight:700;margin:0 6px 0 18px}

  .year{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.78rem;color:var(--blue);font-weight:700;letter-spacing:.15em}
  .scen-text{margin-top:10px;line-height:1.6;color:var(--ice)}
  .voice{margin-top:14px;font-size:.9rem;color:var(--alloy);border-left:2px solid var(--blue);padding:4px 0 4px 14px;font-style:italic;line-height:1.5}
  .outcome{border-left:2px solid var(--co);padding:13px 16px;background:var(--panel);border-radius:0 4px 4px 0;margin-top:14px;line-height:1.6;color:var(--ice)}
  .echo{margin-top:10px;padding:10px 14px;border-left:2px solid var(--amber);background:rgba(245,165,36,.08);border-radius:0 4px 4px 0;font-size:.88rem;line-height:1.5;color:var(--ice);animation:rise .5s .15s both}
  .hist{margin-top:12px;font-size:.85rem;color:var(--alloy);font-style:italic;line-height:1.5;border-top:1px dashed var(--line);padding-top:10px}
  .news{margin-top:14px;border:1px dashed var(--blue);background:var(--panel);border-radius:2px;padding:14px 16px;animation:rise .4s both}
  .news .tag{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.7rem;letter-spacing:.15em;color:var(--amber);font-weight:700}

  .center{text-align:center}
  .big{font-size:2.4rem;margin:8px 0;font-family:Georgia,serif;color:var(--ice)}
  .logo{font-size:2.6rem}
  p{line-height:1.6}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .ach{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:2px;margin-top:8px;background:var(--panel)}
  .ach.locked{opacity:.45;filter:grayscale(1)}
  .ach .ic{font-size:1.3rem}
  .ach .nm{font-weight:600;font-size:.9rem;color:var(--ice)}
  .ach .ds{font-size:.78rem;color:var(--alloy)}
  .stat{padding:12px;border:1px solid var(--line);border-radius:2px;background:var(--panel);text-align:center}
  .stat .v{font-size:1.5rem;font-weight:600;font-family:Georgia,serif;color:var(--blue)}
  .stat .l{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.68rem;color:var(--alloy);text-transform:uppercase;letter-spacing:.08em}
  .boardrow{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:.8rem;color:var(--alloy)}
  .boardrow .bar{flex:1;height:5px}
  .fade-seq>*{opacity:0;animation:rise .6s forwards}
  .fade-seq>*:nth-child(1){animation-delay:.05s}.fade-seq>*:nth-child(2){animation-delay:.25s}
  .fade-seq>*:nth-child(3){animation-delay:.45s}.fade-seq>*:nth-child(4){animation-delay:.65s}
  .fade-seq>*:nth-child(5){animation-delay:.85s}.fade-seq>*:nth-child(6){animation-delay:1.05s}
  .muted-toggle{position:fixed;top:12px;right:14px;background:#080e18c7;border:1px solid var(--line);color:var(--alloy);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;border-radius:99px;padding:5px 12px;font-size:.72rem;cursor:pointer;z-index:9;backdrop-filter:blur(12px)}

  /* Executive dossier — pre-campaign screens, unified with in-game palette */
  .dossier-screen{max-width:1040px;margin:0 auto;color:var(--ice);padding-top:24px}
  .dossier-screen::before{content:"";display:block;height:1px;background:linear-gradient(90deg,transparent,var(--blue) 15%,var(--blue) 85%,transparent);opacity:.72;margin-bottom:18px}
  .dossier-header{display:flex;justify-content:space-between;gap:18px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:18px}
  .dossier-index{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blue)}
  .dossier-title{font-family:Georgia,'Times New Roman',serif;font-size:clamp(2rem,6vw,4.3rem);line-height:.94;letter-spacing:-.045em;color:var(--ice);text-shadow:none;margin:9px 0 0}
  .dossier-subtitle{max-width:610px;color:var(--alloy);font-size:.98rem;line-height:1.7;margin-top:17px}
  .dossier-status{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);white-space:nowrap}
  .dossier-metrics{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
  .dossier-metric{border:1px solid var(--line);padding:7px 10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.7rem;letter-spacing:.06em;color:var(--alloy)}
  .dossier-actions{max-width:480px;margin-top:28px}
  .dossier-action{display:block;width:100%;background:var(--blue);color:#06111f;border:1px solid var(--blue);padding:15px 18px;cursor:pointer;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.76rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:transform .18s ease,box-shadow .18s ease,background .18s ease}
  .dossier-action:hover{background:#8ac0ff;transform:translateY(-2px);box-shadow:0 12px 28px rgba(88,166,255,.22)}
  .dossier-action:focus-visible,.dossier-back:focus-visible{outline:2px solid var(--blue);outline-offset:3px}
  .dossier-back{display:inline-block;background:transparent;color:var(--ice);border:1px solid var(--line);padding:11px 14px;cursor:pointer;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.7rem;letter-spacing:.09em;text-transform:uppercase;margin-top:22px}
  .dossier-back:hover{border-color:var(--blue);color:#fff}
  .dossier-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:24px}
  .dossier-sheet{position:relative;overflow:hidden;background:linear-gradient(145deg,#101c2d,#0b1320);color:var(--ice);padding:22px;border:1px solid var(--line);box-shadow:0 14px 38px rgba(0,0,0,.4);transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}
  .dossier-sheet::before{content:"";position:absolute;inset:0;opacity:0;background:linear-gradient(125deg,#58a6ff24,transparent 54%);transition:opacity .18s;pointer-events:none}
  .dossier-sheet::after{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--co,var(--blue))}
  .dossier-sheet:hover,.dossier-sheet:focus-within{transform:translateY(-4px);border-color:#58a6ff80;box-shadow:0 24px 44px rgba(0,0,0,.5)}
  .dossier-sheet:hover::before,.dossier-sheet:focus-within::before{opacity:1}
  .sheet-top{display:flex;justify-content:space-between;gap:12px;align-items:start;position:relative;z-index:1}
  .sheet-index{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--alloy)}
  .sheet-seal{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border:1px solid var(--line);padding:4px 6px}
  .sheet-title{font-family:Georgia,'Times New Roman',serif;font-size:1.55rem;line-height:1.05;margin-top:22px;position:relative;z-index:1;color:var(--ice)}
  .sheet-pitch{color:var(--alloy);line-height:1.55;margin-top:9px;font-size:.9rem;position:relative;z-index:1}
  .sheet-kpis{border-top:1px solid var(--line);margin-top:17px;padding-top:12px;font-size:.78rem;line-height:1.55;color:var(--alloy);position:relative;z-index:1}
  .sheet-kpis b{color:var(--ice)}
  .sheet-action{width:100%;margin-top:18px;background:#080e18c7;color:var(--ice);border:1px solid var(--line);padding:12px 13px;text-align:left;cursor:pointer;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;position:relative;z-index:1;transition:border-color .18s ease,background .18s ease}
  .sheet-action:hover{background:var(--co,#174d78);border-color:var(--co,var(--blue))}
  .trophy-dossier .dossier-sheet,.era-dossier .dossier-sheet{grid-column:span 2}
  .era-dossier .sheet-title{font-size:2rem}
  @media(max-width:760px){.wrap{max-width:100%;padding:16px 12px 60px}.dossier-header{display:block}.dossier-status{margin-top:13px}.dossier-grid{grid-template-columns:1fr}.trophy-dossier .dossier-sheet,.era-dossier .dossier-sheet{grid-column:span 1}.dossier-title{font-size:2.8rem}}
  @media(prefers-reduced-motion:reduce){.dossier-screen *{animation:none!important;transition:none!important}.dossier-sheet:hover,.dossier-sheet:focus-within{transform:none}}
</style>
</head>

    {id:"eq", year:"SEP 2016", title:"Paris, or the Art of Announcing the Future",

    {id:"empty_stand", year:"2019", title:"The Empty Space on the Stand", cond:"no_eq",
     text:"Frankfurt Motor Show. Audi has the e-tron, Porsche has the Taycan, VW has an ID-something. Mercedes has a hybrid S-Class and a concept under silk. A Bernstein analyst asks on live mic: 'Is Mercedes-Benz planning to participate in the electric century?' The room laughs. Not a friendly laugh.",

 ticker:"TM",
 bankruptcy:"The Toyota Production System — the most studied manufacturing religion on Earth — finally meets a crisis it cannot kaizen its way out of. The line stops, this time for good.",
 legendary:"You took the company that invented lean manufacturing through a recall crisis, an earthquake, an EV reckoning and a scandal wave — and somehow it's still the most trusted name in cars, still #1 by volume, and still betting on a battery nobody else has built yet.",
 eras:{
  a:{
   name:"The Reckoning", years:"2009–2013", start:{marketshare:55, cashflow:60, stockprice:45}, stock0:38, deep:true,
   intro:"June 2009. You are Akio Toyoda, great-grandson of the founder, inheriting the presidency of the world's newly-crowned #1 automaker the moment it posts its first net loss in fifty-nine years. The 'Global 30' expansion that won Toyota the crown is being blamed for diluting its obsessive quality culture. You promised to go 'back to basics.' History is about to test whether you meant it.",
   scenarios:[
    {id:"crown", year:"JAN 2009", title:"The Crown Nobody Wanted",
     text:"Toyota's 2008 sales of 8.97 million edge out GM's 8.36 million, making it #1 for the first time in 77 years — but it lands in the deepest auto downturn since the Depression, with Toyota's own sales down 4%. The 'Global 30' plan that won this crown is increasingly blamed for stretching the quality culture thin.",
     voice:"Paul Ingrassia, auto journalist: \"Toyota is suffering from trying to get too big, too fast.\"",
     choices:[
      {label:"Celebrate the milestone and keep the expansion momentum going", fx:{cashflow:+7,marketshare:-6,stockprice:+3}, set:["expand_proud"],
       result:"The press release reads triumphant. Inside the company, engineers who've been flagging quality slippage for two years feel quietly unheard."},
      {label:"Quietly slow expansion and reinvest in quality systems now, before anything breaks", fx:{marketshare:+7,cashflow:-4}, set:["slow_quality"],
       result:"Wall Street doesn't notice a deceleration dressed as discipline. The board does. It buys you nothing in headlines and everything in foundation."},
      {label:"Downplay the crown entirely; refocus all messaging on cost control given the crisis", fx:{cashflow:+3,marketshare:+1},
       result:"A month later the company forecasts its first operating loss in 71 years, which makes the modesty look prophetic rather than humble.",
       hist:"Real: Toyota downplayed the achievement given the economic backdrop, and Watanabe announced he would step down as the board moved toward a Toyoda family president."}
     ]},
    {id:"family", year:"JUN 2009", title:"The Family Returns",
     text:"Akio Toyoda, 53, is named President — the first family member to lead since 1995. He inherits an $8.6 billion net loss for fiscal year 2009, Toyota's first loss in nearly six decades, after factories built during a decade of breakneck growth sat idle in the financial crisis.",
     voice:"Akio Toyoda, on taking the job: he pledged to steer Toyota \"back to the basics\" of building cars that made customers happy.",
     choices:[
      {label:"Install Toyoda as a symbolic return to founding values", fx:{marketshare:+8,stockprice:-1}, set:["toyoda_pres"],
       result:"The market reads it as Toyota admitting, without quite saying so, that it lost its way. The bet is that blood and history can re-anchor a company that grew too fast.",
       hist:"Real: the board chose Akio Toyoda, who pledged to bring the company 'back to the basics' and greater transparency to its sprawling culture."},
      {label:"Bring in an outside professional manager to signal a clean break from the expansion era", fx:{stockprice:+6,marketshare:-4},
       result:"Modern, credible to analysts, and culturally radioactive inside a company that has never had a non-family, non-lifer president in this era."},
      {label:"Promote from the existing non-family executive bench instead", fx:{marketshare:-1,cashflow:+3},
       result:"Continuity without inspiration. The press asks, not unfairly, what exactly has changed."}
     ]},
    {id:"floormats", year:"OCT 2009", title:"3.8 Million Floor Mats", cond:"toyoda_pres",
     text:"After the fatal August 28, 2009 crash of a Lexus ES350 near San Diego — a 911 call captured the car hitting over 100 mph, killing CHP officer Mark Saylor and three family members — Toyota traces the cause to floor mats trapping pedals and recalls 3.8 million vehicles, its largest recall ever. Internally, it also holds unresolved info on a separate, undisclosed mechanical 'sticky pedal' defect.",
     choices:[
      {label:"Recall broadly and immediately for every plausible cause, including the unconfirmed sticky-pedal mechanism", fx:{marketshare:+10,cashflow:-7}, set:["broad_recall"],
       result:"Expensive and slow, and it costs you a quarter of bad press about 'Toyota can't even diagnose its own cars.' But there is no second recall to walk back later."},
      {label:"Recall narrowly for the confirmed floor-mat cause only, citing insufficient evidence on the rest", fx:{cashflow:+4,marketshare:-3}, set:["narrow_recall"],
       result:"Cheaper and faster today. The DOJ will later conclude Toyota knew weeks before its public statements that other vehicles had similar pedal-entrapment risk — and that calling floor mats the 'root cause' was misleading.",
       hist:"Real: Toyota recalled narrowly for floor mats; this became the central allegation in the 2014 $1.2B DOJ settlement."},
      {label:"Resist a recall entirely; characterize incidents as driver error pending further study", fx:{marketshare:-11,cashflow:+4}, set:["resisted"],
       result:"The position does not survive contact with a 911 recording played on cable news in a loop."}
     ]},
    {id:"sticky", year:"JAN 2010", title:"The Sticky Pedal Recall", cond:"narrow_recall",
     text:"On January 16, 2010, Toyota informs NHTSA that CTS-brand pedals can stick partially depressed. It recalls 2.3 million vehicles January 21, then expands by 1.1 million more on January 27 under NHTSA pressure — and briefly halts sales and production of eight US models.",
     alt:[{if:"broad_recall", text:"Because you recalled broadly back in October, the January CTS pedal disclosure lands as confirmation of a risk you'd already hedged against, not a humiliating second admission. NHTSA still wants the recall widened by 1.1 million vehicles. The politics are softer; the math is the same."}],
     choices:[
      {label:"Recall and halt sales/production immediately and broadly across all affected models", fx:{marketshare:+7,cashflow:-10}, set:["halted_sales"],
       fxIf:[{if:"broad_recall", fx:{marketshare:+3}, note:"Because October's recall was already broad, this looks like consistency, not panic."}],
       result:"Toyota suspends sales of new vehicles using the CTS pedal and halts production at five North American plants for about a week — a step rarely taken by any automaker for a single supplier defect.",
       hist:"Real: Toyota recalled the additional 1.1 million vehicles and suspended sales/production, an unusually drastic move."},
      {label:"Recall but keep selling and building while a fix is engineered", fx:{cashflow:+6,marketshare:-7},
       result:"Dealers keep moving inventory with a known defect on the lot. The headlines write themselves: 'Toyota knew and kept selling.'"},
      {label:"Push back on NHTSA's demand for a wider recall", fx:{marketshare:-10,cashflow:+3},
       result:"Regulators do not respond well to an automaker arguing with them about how many of its cars might suddenly accelerate."}
     ]},
    {id:"congress", year:"FEB 24, 2010", title:"Toyoda Goes to Washington",
     text:"The House Committee on Oversight holds a hearing titled 'Toyota Gas Pedals: Is the Public at Risk?' Toyota has now recalled roughly 8.5 million vehicles worldwide, linked to claims of as many as 89 deaths. Akio Toyoda personally flies to testify — an unusual move his US team reportedly debated at length.",
     voice:"Akio Toyoda, to Congress: \"We pursued growth over the speed at which we are able to develop our people and our organization, and I am deeply sorry for any accidents that Toyota drivers have experienced.\"",
     choices:[
      {label:"Testify personally, apologize directly, and accept responsibility while defending the engineering", fx:{marketshare:+6,stockprice:+1}, set:["toyoda_testified"],
       result:"Toyoda apologizes repeatedly and states he is 'absolutely confident' there is no electronic defect. Lawmakers are unmoved and keep pressing him; the hearing is broadly seen as bruising despite the apology.",
       hist:"Real: Toyoda testified personally on Feb 24, 2010, delivering the quote above, and maintained Toyota's floor-mat/sticky-pedal position under hostile questioning."},
      {label:"Send Toyota's North American executives to testify instead of the president", fx:{marketshare:-7},
       result:"It reads exactly as it is: the man whose name is on the building decided this wasn't worth his own face. Congress notices. So does the press."},
      {label:"Have Toyoda testify, but stick strictly to narrow technical and legal points via counsel", fx:{marketshare:-1,cashflow:+3},
       result:"Lawyered and bloodless. It protects Toyota's legal exposure and forfeits any chance of the apology actually landing as human."}
     ]},
    {id:"qualityczar", year:"MAR 2010", title:"Building a Quality Czar Structure",
     text:"With the crisis still raging and Toyota accused of letting safety concerns get lost between regions and Japan HQ, Toyoda convenes the first meeting of a new Special Committee for Global Quality, which he chairs personally.",
     choices:[
      {label:"Create regional Chief Quality Officer positions empowered to escalate concerns directly, bypassing the regional sales hierarchy", fx:{marketshare:+10,cashflow:+1}, set:["cqo"],
       result:"Toyota creates CQO positions for North America, Europe, Asia/Oceania, China and more, each sitting on the new global quality committee, plus 'customer first' training centers and a faster escalation process — the template for Toyota's post-crisis quality governance.",
       hist:"Real: Toyota established regional Chief Quality Officers and a faster information-escalation process under the new Special Committee for Global Quality."},
      {label:"Centralize all quality decisions in Toyota City, Japan", fx:{marketshare:+3,cashflow:-3},

      {label:"Outsource quality auditing to a third party for outside credibility", fx:{marketshare:+1,stockprice:-1},

    {id:"exoneration", year:"FEB 2011", title:"The Exoneration Nobody Believed",
     text:"After a 10-month joint investigation, NASA and NHTSA conclude there is no electronic-based cause of unintended acceleration in Toyota vehicles; the only confirmed causes remain the already-recalled floor-mat and sticky-pedal defects. The finding vindicates Toyota's technical defense — but plaintiffs' lawyers contest the report's independence, since Toyota's own outside expert was involved.",
     choices:[
      {label:"Use the exoneration aggressively in PR and litigation to rehabilitate Toyota's image", fx:{marketshare:+7,cashflow:+1}, set:["aggressive_pr"],
       result:"It works in the news cycle and backfires in the courtroom: thousands of lawsuits remain unresolved, and three years later a $1.2B federal settlement lands — not over whether electronics caused the defect, but over how Toyota handled disclosure.",
       hist:"Real: Toyota welcomed the NASA/NHTSA finding publicly, but litigation and the disclosure question continued regardless."},
      {label:"Accept the finding quietly, without triumphalism, given the ongoing litigation", fx:{marketshare:+4},
       result:"Measured and a little anticlimactic. It costs you a news cycle of vindication you'd technically earned, and buys you a less combative posture heading into 2014's settlement talks."},
      {label:"Push for further independent review to remove any doubt entirely", fx:{marketshare:+3,cashflow:-3},
       result:"Diligent, expensive, and ultimately redundant — the controversy was never really about the data."}
     ]},
    {id:"earthquake", year:"MAR 2011", title:"The Earthquake Breaks the Machine",
     text:"The March 11, 2011 Tōhoku earthquake and tsunami devastate northeastern Japan, wiping out tier-1 and tier-2 suppliers — especially semiconductors — that Toyota's lean, just-in-time system depended on. Global output falls 78% YoY in April; all 12 main domestic plants halt, costing 150,000+ units of lost production.",
     choices:[
      {label:"Begin building strategic safety-stock inventory and multi-sourcing critical components, even at higher cost", fx:{cashflow:+8,stockprice:+4}, set:["multisource"],
       result:"Toyota starts a multi-year shift toward multi-sourcing and higher safety stocks of key components — a change credited a decade later with helping Toyota weather the 2021 chip shortage better than rivals.",
       hist:"Real: Toyota built multi-sourcing and safety-stock buffers after Tohoku, which softened (though didn't prevent) the 2021 chip crisis."},
      {label:"Maintain the pure just-in-time model and absorb the disruption as a one-off", fx:{cashflow:-4},
       result:"The lean religion survives untouched. So does its exposure to the next disaster, whenever it arrives."},
      {label:"Vertically integrate critical chip and component production to reduce future exposure", fx:{cashflow:+6,stockprice:+1},
       result:"The most expensive, most thorough answer. It will take the rest of the decade to pay off, if it ever fully does."}
     ]},
    {id:"nummi", year:"APR 2010", title:"Selling the Cathedral",
     text:"Toyota's 70%-owned NUMMI joint venture with GM in Fremont, California — built for 500,000+ cars a year — is being abandoned by GM amid its own bankruptcy. Toyota must decide what to do with its half of a plant that employed thousands of UAW workers, while still fighting recall fires at home. A small EV startup called Tesla has approached Toyota directly about the building.",

    {id:"doj", year:"MAR 2014", title:"Paying the Price for Silence", cond:"narrow_recall",
     text:"The DOJ's multi-year investigation concludes that in fall 2009 Toyota told consumers and NHTSA it had identified and addressed the 'root cause' of unintended acceleration (floor mats) while internally aware other vehicles, with different pedal designs, posed similar risk from the undisclosed sticky-pedal mechanism.",

  b:{
   name:"Hybrid Conviction, Hydrogen Bet", years:"2014–2020", start:{marketshare:62, cashflow:64, stockprice:42}, stock0:58,
   intro:"The recall crisis and Tōhoku are behind you. Toyota is stable, profitable, and convinced it knows the right way to decarbonize: the hybrid tech it pioneered with the Prius, and a contrarian bet on hydrogen fuel cells. Meanwhile, the small company in Fremont — the one whose old factory you sold them — is proving electric cars can be desirable. Is Toyota's caution wisdom, or the first sign it mistimed history's biggest automotive shift?",
   scenarios:[
    {id:"mirai", year:"NOV 2014", title:"Betting on Hydrogen, Not Just Batteries",
     text:"Toyota unveils the Mirai — a hydrogen fuel-cell sedan — at the LA Auto Show, with Japan sales starting at ¥6.7 million (~$57,400) and US sales beginning October 2015. Toyota commits to building only 700 units globally in year one, a deliberately small, expensive halo project, even as Tesla's Model S proves battery EVs can be desirable. Toyota frames hydrogen as a path to a whole 'hydrogen society,' not just a car.",
     choices:[
      {label:"Launch hydrogen as a low-volume halo/R&D project while still scaling hybrids as the mass-market core", fx:{stockprice:+6,cashflow:+3}, set:["hydrogen_halo"],
       result:"Mirai launches as a small-volume technology showcase while Prius and hybrid technology remain the actual sales volume driver, and full BEV investment stays comparatively modest through the rest of the decade.",
       hist:"Real: Toyota chose the halo-project path — Mirai as showcase, hybrids as the volume engine."},
      {label:"Commit fully to battery-electric development instead, given Tesla's market validation", fx:{stockprice:+10,marketshare:-1},
       result:"It would have meant admitting, in 2014, that the company's three-decade hydrogen R&D program was a detour. Nobody in Toyota City is ready to say that out loud yet."},
      {label:"Pursue both hydrogen and BEVs aggressively and simultaneously at full scale", fx:{stockprice:+7,cashflow:-7},
       result:"Two moonshots at once, funded from the same hybrid profits. The capital allocation math doesn't survive its first hard year."}
     ]},
    {id:"nev", year:"2017", title:"China Demands an EV, Right Now",
     text:"China's New Energy Vehicle credit mandate forces every automaker selling there to produce or source a quota of plug-in/EV credits or pay penalties — sudden pressure on Toyota, whose China lineup is hybrid-heavy, to either build compliant BEVs or partner for credits.",
     choices:[
      {label:"Partner with Chinese automakers and battery makers to source NEV credits and co-develop compliance EVs", fx:{stockprice:+6,cashflow:+1}, set:["china_partner"],
       result:"Toyota pursues partnerships — including with BYD and other Chinese players in subsequent years — and accelerates localized BEV variants for China through the late 2010s, while keeping a hybrid-first strategy everywhere else.",
       hist:"Real: Toyota leaned on Chinese partnerships and localized BEV variants to meet NEV pressure while preserving its hybrid-first global strategy."},
      {label:"Rapidly localize a dedicated BEV for China alone, even as a low-margin compliance product", fx:{stockprice:+3,cashflow:-3},
       result:"Fast, narrow, and built entirely to satisfy a regulator rather than a customer — which is a strange way to learn how to build EVs."},
      {label:"Lean harder into plug-in hybrids, which partially qualify under some local rules, to delay full commitment", fx:{cashflow:+3,stockprice:-3},
       result:"A clever stall. China's rules keep tightening anyway, and the delay just moves the reckoning a few years down the calendar."}
     ]},
    {id:"solidstate", year:"SEP 2017", title:"The Solid-State Promise",
     text:"Toyota announces it is developing solid-state batteries — promising faster charging, greater range and safety than lithium-ion — and targets commercialization in the early 2020s, a promise that will recur, and slip, for years afterward.",

    {id:"genchi", year:"2019–2020", title:"COVID Tests Genchi Genbutsu",

  c:{
   name:"The EV Reckoning and the Succession", years:"2021–2023", start:{marketshare:64, cashflow:58, stockprice:48}, stock0:70,
   intro:"Pressure has peaked. The press calls Toyota an EV laggard with a straight face, even as the company quietly out-survives the chip shortage better than most rivals. Akio Toyoda is about to make the biggest, loudest BEV commitment of his presidency — and then, a little over a year later, hand the company to someone else entirely.",
   scenarios:[
    {id:"chipshortage", year:"AUG 2021", title:"The Chip Shortage Test",
     text:"The global semiconductor shortage, worsened by COVID factory shutdowns in Southeast Asia, forces Toyota — which built a safety-stock buffer after the 2011 earthquake — to cut global production by as much as 40% in some months: September 2021's planned ~900,000 units fall to ~540,000. The earlier resilience investment delayed but did not prevent significant pain.",
     choices:[
      {label:"Protect the safety stock and prioritize high-margin, high-demand models with available chips", fx:{cashflow:+6,marketshare:+1}, set:["chip_protected"],
       result:"Toyota draws on its safety stock to outlast peers initially, faring comparatively better than GM and Ford in the shortage's first year — though by autumn 2021 it's still forced into major production cuts as the shortage deepens and outlasts the buffer.",
       hist:"Real: Toyota's post-2011 safety-stock strategy helped it weather the early shortage better than rivals, before still taking major cuts later in 2021."},
      {label:"Draw down all available inventory immediately to maximize near-term output regardless of model mix", fx:{cashflow:+3,marketshare:-3},
       result:"A short-term volume sugar high that leaves the cupboard bare exactly when the shortage proves longer than anyone hoped."},
      {label:"Renegotiate aggressively with chip suppliers for guaranteed allocation at higher cost", fx:{cashflow:+4,marketshare:-1},

    {id:"pivot", year:"DEC 14, 2021", title:"The $35 Billion Pivot",
     text:"Akio Toyoda holds a major press conference unveiling Toyota's electrification plan: 30 new BEV models by 2030, a target of 3.5 million annual BEV sales by 2030, and roughly $35 billion ($70B combined with hybrids) in planned investment — staged with 16 EV and Lexus concept vehicles on stage, a far larger public BEV commitment than anything Toyota had previously announced.",

      {label:"Avoid a single big-bang announcement and let incremental product launches speak for themselves", fx:{stockprice:+1,marketshare:-4},

    {id:"overhyped", year:"2022", title:"Overhyped", cond:"big_pivot",
     text:"As rivals race toward EV-only futures and press coverage intensifies around Toyota's 'laggard' reputation — having launched only one BEV, the bZ4X, by 2023 — Akio Toyoda pushes back publicly and repeatedly, arguing the industry's all-in EV consensus is mistaken and that combustion, hybrids and hydrogen will all remain relevant.",

    {id:"bz4x", year:"JUN 2022", title:"The Wheels Came Off",
     text:"Toyota's first dedicated global BEV, the bZ4X (and its Subaru-badged twin, the Solterra), is recalled within weeks of launch after Toyota discovers hub bolts on all four wheels could loosen with repeated hard cornering or braking, in the worst cases causing a wheel to detach entirely while driving. Only 2,700 units had been built or sold globally. Toyota has no fix and tells owners not to drive the cars at all.",

      {label:"Issue a more limited advisory and continue limited sales while investigating", fx:{cashflow:+3,marketshare:-7},

  c:{
   name:"Scale or Die: The Merger Crusade", years:"2014–2019", start:{cashflow:45, marketshare:60, stockprice:55}, stock0:11,
   intro:"FCA is finally one company. You're now convinced the entire auto industry is structurally unprofitable — duplicated R&D, duplicated capital spending, everyone reinventing the same wheel at ruinous cost. Only mega-mergers can fix it, and you intend to spend the rest of your career proving it, starting with the most profitable asset in the portfolio.",
   scenarios:[
    {id:"ferrari", year:"OCT 2014", title:"Spin Off the Crown Jewel",
     text:"FCA is still capital-starved relative to its $60 billion product-investment ambitions. You propose spinning off Ferrari — FCA's most profitable and prestigious brand — into a separately listed company, partly to raise cash and partly to let Ferrari trade at luxury-goods multiples, like Hermès, instead of auto-industry multiples.",
     choices:[
      {label:"Spin off Ferrari via IPO — let it trade on its own luxury multiple", fx:{cashflow:+8,stockprice:+3}, set:["ferrari_spun"],
       result:"FCA announces the separation in October 2014; Ferrari's IPO prices on the NYSE in October 2015, raising capital for FCA's broader investment plan. Ferrari has since traded at a major valuation premium to FCA/Stellantis, vindicating the thesis completely.",
       hist:"Real: Ferrari's NYSE IPO priced October 2015 and has since traded at a major premium to FCA/Stellantis."},
      {label:"Keep Ferrari fully inside FCA as a permanent profit anchor", fx:{cashflow:-4,stockprice:-3},
       result:"Steady, comfortable, and you leave billions of unrealized luxury-multiple value sitting inside an auto-industry stock forever."},
      {label:"Spin off Maserati instead — a less iconic, less painful asset to let go", fx:{cashflow:+1,marketshare:-3},
       result:"Maserati's IPO interest is tepid; luxury investors wanted the Prancing Horse, not the trident. The raise disappoints."}
     ]},
    {id:"capitaljunkie", year:"APR–MAY 2015", title:"Confessions of a Capital Junkie",
     text:"You publish a 26-page deck arguing the industry wastes tens of billions duplicating R&D and capital spending on redundant technology, and that consolidation is the only cure. You aim the argument squarely at General Motors — and at its CEO, Mary Barra.",
     voice:"Mary Barra, GM CEO, June 2015: \"For the past few years, we've been merging with ourselves. We have scale and we're leveraging that. We're focused on that and not the other.\"",
     choices:[
      {label:"Release the deck publicly, then propose a merger directly to Barra", fx:{stockprice:+7,marketshare:+1}, set:["gm_approach"],
       result:"You release the presentation April 29, 2015, calling it an 'insider perspective on the cure for the industry's value-destroying addiction to capital.' Investors call the argument 'spot on' and shares briefly rally — but GM's board reviews and rejects your direct merger proposal.",
       hist:"Real: Marchionne released 'Confessions of a Capital Junkie' April 29, 2015 and proposed a merger to GM's Mary Barra; GM's board reviewed and rejected it."},
      {label:"Keep FCA independent and focus purely on internal cost discipline", fx:{cashflow:+6,stockprice:-7}, set:["went_alone"],
       result:"Disciplined and unglamorous. No merger headlines, no rejection either — just the slow grind of margin improvement without scale."},
      {label:"Approach a different target instead of GM — a Japanese or Korean automaker", fx:{stockprice:+3,marketshare:-1},
       result:"The overture goes nowhere fast; cross-Pacific merger logic moves at the speed of two boards that have never met, which is to say not at all."}
     ]},
    {id:"crusadecontinues", year:"2015–2017", title:"The Crusade Continues, Alone",
     text:"Rebuffed by GM, you don't give up on consolidation logic. You keep making the public case for industry mergers for years, while FCA invests heavily in Jeep and Ram — its most profitable brands — and scales back small-car and sedan programs in North America.",
     choices:[
      {label:"Cut sedans entirely in North America, double down on Jeep and Ram", fx:{cashflow:+10,marketshare:-3}, set:["cut_sedans"],
       result:"FCA stops building the Dodge Dart and Chrysler 200 sedans in the U.S. to focus capacity on Jeep/Ram trucks and SUVs — a hugely profitable bet during the SUV/truck boom — while you keep publicly floating merger ideas at every auto show that will have you.",
       hist:"Real: FCA announced in 2016 it would stop building the Dart and Chrysler 200 to focus on Jeep/Ram; Marchionne kept floating merger ideas through at least 2017."},
      {label:"Abandon the merger crusade and focus solely on FCA's own portfolio", fx:{cashflow:+4,stockprice:-8},
       result:"Quieter, more inward-looking. The duplicated-capital problem you diagnosed so loudly doesn't go away just because you stopped talking about it."},
      {label:"Pursue technology-sharing alliances short of a full merger, e.g. with Google/Waymo", fx:{stockprice:+4,cashflow:+1}, set:["waymo_alliance"],

    {id:"succession", year:"JUL 2018", title:"The Sudden Succession",
     text:"Shoulder surgery in early summer 2018 develops serious complications. Your health is failing fast, and FCA's board, chaired by John Elkann, must improvise a succession plan in real time.",

     text:"Less than a year into the job, Manley revives the consolidation logic: on May 27, 2019, FCA proposes an all-stock 50/50 merger with Renault, creating the world's third-largest automaker by volume and promising roughly €5 billion a year in synergies.",

  d:{
   name:"Stellantis: Margins, Mutiny, and a New CEO", years:"2020–2026", start:{cashflow:55, marketshare:50, stockprice:70}, stock0:14,

     text:"Shareholders have approved the merger; it completes January 16, 2021, with shares trading on Euronext Paris/Milan and the NYSE under ticker STLA within days. The combined company needs a name — chosen as 'Stellantis,' from the Latin for 'to brighten with stars' — and a CEO from one of two legacy camps.",
     choices:[
      {label:"Name Carlos Tavares CEO, with Elkann as Chairman", fx:{stockprice:+7,cashflow:+4}, set:["tavares_ceo"],

    {id:"dareforward", year:"MAR 2022", title:"Dare Forward 2030", cond:"tavares_ceo",

/* ---------- audio ---------- */
let AC = null;
function beep(freq, dur, type, vol){
  if(!soundOn) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol||.06, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime+(dur||.12));
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+(dur||.12));
  }catch(e){}
}
const sfx = {
  click(){ beep(520,.07,'triangle'); },
  good(){ beep(523,.1,'sine'); setTimeout(()=>beep(784,.14,'sine'),90); },
  bad(){ beep(196,.2,'sawtooth',.05); },
  news(){ beep(880,.08,'square',.04); setTimeout(()=>beep(880,.08,'square',.04),140); },
  win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.22,'sine'),i*140)); },
  lose(){ [392,330,262,196].forEach((f,i)=>setTimeout(()=>beep(f,.25,'sawtooth',.05),i*170)); }
};

/* ---------- helpers ---------- */
function clamp(v){ return Math.max(0, Math.min(100, v)); }
function evalCond(cond){
  if(!cond) return true;
  // '||' (lower precedence) splits into OR-groups; each group's '&&' terms are ANDed.
  return cond.split('||').some(group=>
    group.split('&&').every(t=>{ t=t.trim(); return t[0]==='!' ? !S.flags[t.slice(1)] : !!S.flags[t]; })
  );
}
function money(v){ return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ---------- dev-only data self-test ----------
   Call window.runSelfTest() from the console, or load with ?debug=1, to validate
   every company/era for: (a) start{} keys matching kpis[] keys, (b) every flag
   referenced in cond/if/fxIf/echo is set by some earlier-or-equal scenario in the
   same era (catches both "never set" typos and "set too late to ever be true"
   unreachable scenarios), and (c) fx/fxIf never touch a KPI key outside kpis[]. */
function runSelfTest(){
  const issues = [];
  function flagsIn(cond){
    if(!cond) return [];
    return cond.split(/&&|\|\|/).map(t=>t.trim().replace(/^!/,'')).filter(Boolean);
  }
  for(const co in DATA){
    const c = DATA[co];
    const kpiKeys = c.kpis.map(k=>k.key);
    for(const ek in c.eras){
      const e = c.eras[ek];
      const tag = `${co}/${ek} (${e.name})`;
      const startKeys = Object.keys(e.start);
      if(startKeys.length!==kpiKeys.length || !startKeys.every(k=>kpiKeys.includes(k))){
        issues.push(`${tag}: start{} keys [${startKeys}] don't match kpis[] keys [${kpiKeys}]`);
      }
      const setAnywhere = new Set();
      const setBefore = [];
      let cumulative = new Set();
      e.scenarios.forEach((sc,i)=>{
        setBefore[i] = new Set(cumulative);
        (sc.choices||[]).forEach(ch=>{ if(ch.set) ch.set.forEach(f=>{ setAnywhere.add(f); cumulative.add(f); }); });
      });
      const checkFlag = (f, before, where) => {
        if(!setAnywhere.has(f)) issues.push(`${tag} ${where}: references flag "${f}" that is never set in this era`);
        else if(before && !before.has(f)) issues.push(`${tag} ${where}: references flag "${f}" only set at/after this point — UNREACHABLE`);
      };
      const checkFxKeys = (fx, where) => Object.keys(fx||{}).forEach(k=>{ if(!kpiKeys.includes(k)) issues.push(`${tag} ${where}: fx references unknown KPI key "${k}"`); });
      e.scenarios.forEach((sc,i)=>{
        const before = setBefore[i];
        const label = `scenario "${sc.id||sc.title}"`;
        flagsIn(sc.cond).forEach(f=>checkFlag(f, before, label));
        (sc.alt||[]).forEach(a=>flagsIn(a.if).forEach(f=>checkFlag(f, before, `${label} alt`)));
        (sc.choices||[]).forEach(ch=>{
          flagsIn(ch.cond).forEach(f=>checkFlag(f, before, `${label} choice "${ch.label}"`));
          (ch.fxIf||[]).forEach(fi=>{ flagsIn(fi.if).forEach(f=>checkFlag(f, before, `${label} choice "${ch.label}" fxIf`)); checkFxKeys(fi.fx, `${label} choice "${ch.label}" fxIf`); });
          (ch.echo||[]).forEach(ec=>flagsIn(ec.if).forEach(f=>checkFlag(f, before, `${label} choice "${ch.label}" echo`)));
          checkFxKeys(ch.fx, `${label} choice "${ch.label}"`);
        });
      });
    }
  }
  if(issues.length){ console.warn(`[selfTest] ${issues.length} issue(s) found:`); issues.forEach(m=>console.warn(' -', m)); }
  else console.log('[selfTest] all company/era data passed validation.');
  return issues;
}
window.runSelfTest = runSelfTest;

function startGame(co, ek){

        usedEvents:[], lastWasEvent:false, total:0 };

}

/* ---------- HUD ---------- */
function spark(){
  const h = S.stockHist;
  if(h.length<2) return '<svg viewBox="0 0 100 34" preserveAspectRatio="none"><line x1="0" y1="17" x2="100" y2="17" stroke="var(--line)" stroke-width="1"/></svg>';
  const mn = Math.min(...h), mx = Math.max(...h), rng = (mx-mn)||1;
  const pts = h.map((v,i)=>`${(i/(h.length-1)*100).toFixed(1)},${(30-(v-mn)/rng*26+2).toFixed(1)}`).join(' ');
  const up = h[h.length-1] >= h[0];
  return `<svg viewBox="0 0 100 34" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${up?'var(--good)':'var(--bad)'}" stroke-width="1.6" vector-effect="non-scaling-stroke"/></svg>`;
}
function hud(c){
  const last = S.stockHist.length>1 ? S.stockHist[S.stockHist.length-2] : S.stock;
  const chg = ((S.stock-last)/last*100);
  const blvl = S.board>=60?'good':S.board>=30?'warn':'bad';
  const bcol = `var(--${blvl})`;
  return `<div class="hud">` + c.kpis.map(k=>{
    const v = S.kpi[k.key];
    const lvl = v>=60?'good':v>=30?'warn':'bad';
    const col = `var(--${lvl})`;
    const lvlLabel = lvl==='good'?'Stable':lvl==='warn'?'Watch':'Critical';
    const d = S.lastFx ? S.lastFx[k.key]||0 : 0;
    const ds = d ? `<span class="delta ${d>0?'good':'bad'}">${d>0?'+':''}${d}</span>` : '';
    return `<div class="kpi ${d<0?'hit':''}"><div class="name">${k.label}</div><div class="val">${v}${ds} <span class="lvltag ${lvl}">${lvlLabel}</span></div>
      <div class="bar"><i data-lvl="${lvl}" style="width:${v}%;background:${col}"></i></div></div>`;
  }).join('') +
  `<div class="stockbox"><div class="name" style="font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px">${DATA[S.co].ticker} · Stock</div>
    <div class="val" style="font-size:1.35rem;font-weight:750;margin:3px 0">${money(S.stock)} <span class="delta ${chg>=0?'good':'bad'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(1)}%</span></div>
    ${spark()}</div></div>
  <div class="boardrow"><span>🏛️ Board patience</span><div class="bar"><i data-lvl="${blvl}" style="width:${S.board}%;background:${bcol}"></i></div><span>${S.board}</span></div>`;
}
function tickerBar(){
  const pool = TICKER[S.co];
  const picks = [];
  for(let i=0;i<4;i++) picks.push(pool[(S.played*3+i*2)%pool.length]);
  picks.push(`${DATA[S.co].ticker} ${money(S.stock)}`);
  return `<div class="ticker"><div class="inner">${picks.map(p=>`<b>›</b>${p}`).join('')}</div></div>`;
}

/* ---------- flow ---------- */
function currentScenario(){
  const e = DATA[S.co].eras[S.ek];
  while(S.idx < e.scenarios.length && !evalCond(e.scenarios[S.idx].cond)) S.idx++;
  return S.idx < e.scenarios.length ? e.scenarios[S.idx] : null;
}
function remaining(e){
  let n=0; for(let i=S.idx;i<e.scenarios.length;i++) if(evalCond(e.scenarios[i].cond)) n++;
  return n;
}

function maybeEvent(){
  // ~30% chance, never twice in a row, max 3 per run, not on first/last round
  const e = DATA[S.co].eras[S.ek];
  const c0 = DATA[S.co];
  if(S.lastWasEvent || S.usedEvents.length>=3 || S.played===0 || remaining(e)<=1) return false;
  if(c0.kpis.some(k=>S.kpi[k.key]<8)) return false; // no RNG kill-shots when a KPI is already in the danger zone
  if(Math.random() > .3) return false;
  const pool = EVENTS[S.co].filter((ev,i)=>!S.usedEvents.includes(i));
  if(!pool.length) return false;
  const ev = pool[Math.floor(Math.random()*pool.length)];
  S.usedEvents.push(EVENTS[S.co].indexOf(ev));
  S.lastWasEvent = true;
  // events can bruise a KPI but never finish it off — only a player's own choice can end the run
  for(const k in ev.fx) S.kpi[k] = Math.max(1, clamp(S.kpi[k]+ev.fx[k]));
  S.lastFx = ev.fx;
  updateStock(ev.fx);
  sfx.news();
  const c = DATA[S.co];
  const dead = c.kpis.find(k=>S.kpi[k.key]<=0);
  app.innerHTML = `<div class="screen">
    ${hud(c)}
    <div class="news">
      <div class="tag">⚡ BREAKING</div>
      <h2 style="margin-top:6px">${ev.title}</h2>
      <p class="dim">${ev.text}</p>
      <div class="outcome" style="border-color:var(--warn)">${ev.up}</div>
      ${dead
        ? `<button class="btn" onclick="endScreen('kpi','${dead.key}')"><span class="t bad">Face the board…</span></button>`
        : `<button class="btn" onclick="sfx.click();renderScenario(true)"><span class="t">Back to the desk →</span></button>`}
    </div></div>`;
  saveProgress();
  window.scrollTo(0,0);
  return true;
}

function renderScenario(skipEvent){
  const c = DATA[S.co], e = c.eras[S.ek];
  if(!skipEvent && maybeEvent()) return;
  S.lastWasEvent = false;
  const sc = currentScenario();
  if(!sc){ endScreen('end'); return; }
  let text = sc.text;
  if(sc.alt) for(const a of sc.alt) if(evalCond(a.if)){ text = a.text; break; }
  const total = Math.max(S.total, S.played+1);
  app.innerHTML = `<div class="screen">
    <div><span class="pill">${c.logo} <b>${c.short}</b></span><span class="pill">${e.name}</span><span class="pill">Decision <b>${S.played+1}</b> of ~${total}</span></div>
    ${hud(c)}
    ${tickerBar()}
    <div class="card glow">
      <div class="year">${sc.year}</div>
      <h2>${sc.title}</h2>
      <p class="scen-text">${text}</p>
      ${sc.voice?`<div class="voice">${sc.voice}</div>`:''}
      ${sc.choices.filter(ch=>evalCond(ch.cond)).map(ch=>`<button class="btn" onclick="choose(${sc.choices.indexOf(ch)})"><span class="t">${ch.label}</span></button>`).join('')}
    </div></div>`;
  S.lastFx = null;
  saveProgress();
  window.scrollTo(0,0);
}

function updateStock(fx){
  const sum = Object.values(fx).reduce((a,b)=>a+b,0);
  let pct = sum/55 + (Math.random()-.5)*.06;
  pct = Math.max(-.30, Math.min(.40, pct));
  S.stock = Math.max(.5, S.stock*(1+pct));
  S.stockHist.push(S.stock);
}

function choose(i){
  const c = DATA[S.co], e = c.eras[S.ek], sc = e.scenarios[S.idx], ch = sc.choices[i];
  const fx = {...ch.fx};
  const notes = [];
  if(ch.fxIf) for(const f of ch.fxIf) if(evalCond(f.if)){
    for(const k in f.fx) fx[k] = (fx[k]||0) + f.fx[k];
    notes.push(f.note);
  }
  for(const k in fx) S.kpi[k] = clamp((S.kpi[k]||0) + fx[k]);
  if(ch.set) for(const fl of ch.set) S.flags[fl] = true;
  const echoes = [];
  if(ch.echo) for(const ec of ch.echo) if(evalCond(ec.if)) echoes.push(ec.text);
  S.lastFx = fx;
  S.played++;
  S.log.push({title:sc.title, choice:ch.label, hist:!!ch.hist});
  // meta systems
  S.histTotal++; if(ch.hist) S.histMatch++;
  updateStock(fx);
  const sum = Object.values(fx).reduce((a,b)=>a+b,0);
  S.board = clamp(S.board + (sum>=5?+5:sum>=0?+2:-4));
  // Penalty scales with how dire the worst KPI is, instead of one flat hit the
  // moment any KPI dips under 25 — so a single rough patch doesn't snowball into
  // an unrecoverable board death spiral on its own.
  const minK = Math.min(...c.kpis.map(k=>S.kpi[k.key]));
  if(minK < 10) S.board = clamp(S.board-5);
  else if(minK < 25) S.board = clamp(S.board-2);
  if(minK <= 10) S.brink = true;
  (sum>=0?sfx.good:sfx.bad)();
  const dead = c.kpis.find(k=>S.kpi[k.key]<=0);
  const coup = S.board<=0;
  app.innerHTML = `<div class="screen">
    <div><span class="pill">${c.logo} <b>${c.short}</b></span><span class="pill">Decision <b>${S.played}</b></span></div>
    ${hud(c)}
    <div class="card">
      <div class="year">${sc.year}</div>
      <h2>${sc.title}</h2>
      <p class="dim" style="margin-top:6px">You chose: <b style="color:var(--text)">${ch.label}</b></p>
      <div class="outcome">${ch.result}</div>
      ${notes.map(n=>`<div class="echo">⟲ ${n}</div>`).join('')}
      ${echoes.map(n=>`<div class="echo">⟲ ${n}</div>`).join('')}
      ${ch.hist?`<div class="hist">📜 ${ch.hist}</div>`:`<div class="hist">📜 History took a different road here. Yours might be better — the market will decide.</div>`}
      ${dead ? `<button class="btn" onclick="endScreen('kpi','${dead.key}')"><span class="t bad">Face the board…</span></button>`
       : coup ? `<button class="btn" onclick="endScreen('coup')"><span class="t bad">The board is calling an emergency session…</span></button>`
       : `<button class="btn" onclick="sfx.click();S.idx++;renderScenario()"><span class="t">Continue →</span></button>`}
    </div></div>`;
  window.scrollTo(0,0);
}

/* ---------- endings ---------- */
function endScreen(kind, deadKey){
  const c = DATA[S.co], e = c.eras[S.ek];
  const avg = Math.round(c.kpis.reduce((a,k)=>a+S.kpi[k.key],0)/c.kpis.length);
  const stockX = S.stock/e.stock0;
  const align = S.histTotal? Math.round(S.histMatch/S.histTotal*100) : 0;
  const score = Math.round(avg*0.6 + Math.min(stockX*10,30) + S.board*0.1);
  let title, msg, icon, win=false;
  if (S.flags.sold_google){ icon='🔍'; title='ACQUIRED'; msg=`Tesla lives on as a Google division. The mission survived; the legend didn't. Business schools will debate this one forever — and so will you.`; }
  else if (S.flags.sold_soul){ icon='🏳️'; title='ABSORBED'; msg=`You sold in the dark winter of 2009. The buyer shelved the EV program in 2011 when gas got cheap. Somewhere, an alternate timeline is having more fun.`; }
  else if (kind==='kpi'){ const k=c.kpis.find(x=>x.key===deadKey); icon='🪦'; title='FIRED'; msg=`Your <b>${k.label}</b> collapsed to zero. ${DATA[S.co].bankruptcy}`; }
  else if (kind==='coup'){ icon='🗳️'; title='BOARD COUP'; msg=`No single catastrophe — just a board that stopped believing. The vote is unanimous, the press release warm, the knife invisible. Your KPIs were ${avg}; your support was zero.`; }
  else if (avg>=75){ win=true; icon='🏆'; title='LEGENDARY CEO'; msg=`${DATA[S.co].legendary}`; }
  else if (avg>=55){ win=true; icon='⭐'; title='RESPECTED CEO'; msg=`A strong tenure with real wins and survivable scars. The board renews your contract; the biography sells modestly.`; }
  else if (avg>=35){ win=true; icon='😬'; title='SURVIVOR'; msg=`You kept the lights on, barely. History will record you as a caretaker in revolutionary times.`; }
  else { win=false; icon='📉'; title='QUIETLY REPLACED'; msg=`No single disaster, just steady decline. The press release says you're "pursuing new opportunities."`; }
  const success = win && avg>=55;
  (success?sfx.win:sfx.lose)();
  // achievements — only a genuine success (avg>=55, not fired/coup'd/quietly replaced) earns trophies or a best-score update
  const sv = loadSave();
  const unlocked = [];
  function grant(id){ if(!sv.ach[id]){ sv.ach[id]=true; unlocked.push(ACH.find(a=>a.id===id)); } }
  if(success && c.kpis.every(k=>S.kpi[k.key]>=70)) grant('iron');
  if(success && S.brink) grant('brink');
  if(success && S.histTotal>=8 && align>=75) grant('hist');
  if(success && S.histTotal>=8 && align<=30) grant('mav');
  if(success && stockX>=4) grant('moon');
  if(success && S.board>80) grant('board');
  if(S.flags.sold_google) grant('google');
  if(S.flags.sold_soul) grant('soul');
  if(title==='LEGENDARY CEO') grant('legend');
  sv.runs++; if(success && score>sv.best) sv.best=score;
  commitSave(sv);
  clearProgress();
  app.innerHTML = `<div class="screen">
    <div class="center" style="margin-top:26px">
      <div class="logo">${icon}</div>
      <h1 class="big">${title}</h1>
      <p class="dim">${c.name} · ${e.name} (${e.years})</p>
    </div>
    ${hud(c)}
    <div class="card"><p>${msg}</p></div>
    <div class="card">
      <h2>Final Report</h2>
      <div class="grid2" style="margin-top:10px">
        <div class="stat"><div class="v">${money(S.stock)}</div><div class="l">Stock (${stockX>=1?'+':''}${Math.round((stockX-1)*100)}% from ${money(e.stock0)})</div></div>
        <div class="stat"><div class="v">${score}</div><div class="l">Legacy score</div></div>
        <div class="stat"><div class="v">${align}%</div><div class="l">Matched real history</div></div>
        <div class="stat"><div class="v">${S.board}</div><div class="l">Board patience at exit</div></div>
      </div>
    </div>
    ${unlocked.length?`<div class="card glow"><h2>🏆 Unlocked</h2>${unlocked.map(a=>`<div class="ach"><div class="ic">${a.ic}</div><div><div class="nm">${a.nm}</div><div class="ds">${a.ds}</div></div></div>`).join('')}</div>`:''}
    <div class="card">
      <h2>Your Tenure</h2>
      ${S.log.map((l,i)=>`<p style="margin-top:8px;font-size:.88rem"><span class="dim">${i+1}. ${l.title}:</span> ${l.choice} ${l.hist?'<span class="dim" style="font-size:.75rem">· as history had it</span>':'<span class="goldc" style="font-size:.75rem">· your road</span>'}</p>`).join('')}
      ${e.deep?`<p class="dim" style="margin-top:14px;font-size:.8rem">Path markers: ${Object.keys(S.flags).length?Object.keys(S.flags).join(' · '):'none'} — replay differently to unlock hidden scenarios.</p>`:''}
    </div>
    <div class="grid2">
      <button class="btn" onclick="sfx.click();startGame(S.co,S.ek)"><span class="t" style="text-align:center">↻ Run it back</span></button>
      <button class="btn" onclick="sfx.click();titleScreen()"><span class="t" style="text-align:center">🏁 Title screen</span></button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

(function boot(){
  try{ document.getElementById('mute').textContent = soundOn ? '🔊 sound' : '🔇 muted'; }catch(e){}
  try{
    const params = new URLSearchParams(window.location.search);
    if(params.get('debug')==='1') runSelfTest();
    const co = params.get('company');
    const era = params.get('era');
    if(co && DATA[co] && era && DATA[co].eras[era]){ startGame(co, era); return; }
    if(co && DATA[co]){ eraScreen(co); return; }
  }catch(e){}
  titleScreen();
})();
</script>
