<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIVE — An Automotive CEO Saga · v3</title>
<style>
  :root{
    --bg:#07090d; --bg2:#0b0f16; --panel:#10151f; --panel2:#171e2b; --border:#26304200;
    --line:#263042; --text:#e9eef5; --dim:#8a94a6; --accent:#5aa7ff; --gold:#d9b25f;
    --good:#41c46a; --bad:#ff5f56; --warn:#e0a93e;
    --co:#5aa7ff; --co-glow:rgba(90,167,255,.18);
  }
  body.theme-tesla{ --co:#e82127; --co-glow:rgba(232,33,39,.16); }
  body.theme-mercedes{ --co:#c7cdd6; --co-glow:rgba(199,205,214,.13); }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, var(--co-glow), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(90,167,255,.07), transparent 60%),
      var(--bg);
    color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    transition:background 1s;
  }
  .wrap{max-width:880px;margin:0 auto;padding:20px 16px 80px;min-height:100vh}
  h1,h2,.display{font-family:Georgia,'Times New Roman',serif;letter-spacing:.3px}
  h1{font-size:1.9rem;font-weight:700}
  h2{font-size:1.35rem;margin-bottom:6px}
  .dim{color:var(--dim)}
  .kicker{font-size:.74rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--co);font-weight:700}

  /* screens & transitions */
  .screen{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:14px;padding:24px;margin-top:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .card.glow{border-color:color-mix(in srgb, var(--co) 45%, var(--line));box-shadow:0 0 40px var(--co-glow),0 10px 30px rgba(0,0,0,.35)}

  .btn{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);border-radius:11px;padding:14px 16px;margin-top:10px;cursor:pointer;font-size:.95rem;
    line-height:1.5;transition:transform .12s, border-color .15s, background .15s, box-shadow .2s;font-family:inherit}
  .btn:hover{border-color:var(--co);background:#1d2636;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.3)}
  .btn:active{transform:translateY(0)}
  .btn .t{font-weight:650;display:block;margin-bottom:3px}
  .btn.ghost{background:transparent;text-align:center}
  .btn.primary{border-color:var(--co)}

  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:99px;
    padding:3px 12px;font-size:.76rem;color:var(--dim);margin:0 6px 6px 0}
  .pill b{color:var(--text)}

  /* HUD */
  .hud{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .kpi{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
  .kpi .name{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  .kpi .val{font-size:1.35rem;font-weight:750;margin:3px 0}
  .kpi.hit{animation:shake .4s}
  @keyframes shake{25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}}
  .bar{height:6px;background:#060a10;border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:99px;transition:width .7s cubic-bezier(.2,.7,.3,1)}
  .delta{font-size:.78rem;margin-left:6px;font-weight:600}
  .good{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)} .goldc{color:var(--gold)}

  .stockbox{flex:1.2;min-width:190px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stockbox svg{display:block;width:100%;height:34px;margin-top:6px}

  /* ticker */
  .ticker{margin-top:14px;border:1px solid var(--line);border-radius:10px;background:#0a0e15;overflow:hidden;white-space:nowrap;position:relative}
  .ticker .inner{display:inline-block;padding:7px 0;font-size:.78rem;color:var(--dim);animation:tick 28s linear infinite;padding-left:100%}
  @keyframes tick{to{transform:translateX(-100%)}}
  .ticker b{color:var(--co);font-weight:700;margin:0 6px 0 18px}

  .year{font-size:.82rem;color:var(--co);font-weight:700;letter-spacing:2px}
  .scen-text{margin-top:10px;line-height:1.7;color:#c7cfdb}
  .voice{margin-top:14px;font-size:.9rem;color:var(--dim);border-left:2px solid var(--co);padding:4px 0 4px 14px;font-style:italic;line-height:1.55}
  .outcome{border-left:3px solid var(--co);padding:13px 16px;background:var(--panel2);border-radius:0 11px 11px 0;margin-top:14px;line-height:1.6}
  .echo{margin-top:10px;padding:10px 14px;border-left:3px solid var(--gold);background:#191507;border-radius:0 11px 11px 0;font-size:.88rem;line-height:1.55;color:#e3c77a;animation:rise .5s .15s both}
  .hist{margin-top:12px;font-size:.85rem;color:var(--dim);font-style:italic;line-height:1.5;border-top:1px dashed var(--line);padding-top:10px}
  .news{margin-top:14px;border:1px solid #4a3413;background:#181206;border-radius:11px;padding:14px 16px;animation:rise .4s both}
  .news .tag{font-size:.7rem;letter-spacing:2px;color:var(--warn);font-weight:700}

  .center{text-align:center}
  .big{font-size:2.4rem;margin:8px 0}
  .logo{font-size:2.6rem}
  p{line-height:1.65}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .ach{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-top:8px;background:var(--panel2)}
  .ach.locked{opacity:.38;filter:grayscale(1)}
  .ach .ic{font-size:1.3rem}
  .ach .nm{font-weight:650;font-size:.9rem}
  .ach .ds{font-size:.78rem;color:var(--dim)}
  .stat{padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);text-align:center}
  .stat .v{font-size:1.5rem;font-weight:750;font-family:Georgia,serif}
  .stat .l{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
  .boardrow{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:.8rem;color:var(--dim)}
  .boardrow .bar{flex:1;height:5px}
  .fade-seq>*{opacity:0;animation:rise .6s forwards}
  .fade-seq>*:nth-child(1){animation-delay:.05s}.fade-seq>*:nth-child(2){animation-delay:.25s}
  .fade-seq>*:nth-child(3){animation-delay:.45s}.fade-seq>*:nth-child(4){animation-delay:.65s}
  .fade-seq>*:nth-child(5){animation-delay:.85s}.fade-seq>*:nth-child(6){animation-delay:1.05s}
  .muted-toggle{position:fixed;top:12px;right:14px;background:var(--panel2);border:1px solid var(--line);color:var(--dim);
    border-radius:99px;padding:5px 12px;font-size:.75rem;cursor:pointer;z-index:9}
</style>
</head>
<body>
<button class="muted-toggle" id="mute" onclick="toggleSound()">🔊 sound</button>

</script>
<script>
DATA.tesla = {
 name:"Tesla", short:"Tesla", logo:"⚡", theme:"theme-tesla", ipo:17,
 pitch:"A scrappy EV startup that has never made an annual profit. High risk, history-making upside.",
 kpis:[
  {key:"cash", label:"Cash Runway", desc:"Liquidity. Hit zero and Tesla goes bankrupt."},
  {key:"prod", label:"Production", desc:"Ability to actually build and ship cars."},
  {key:"conf", label:"Confidence", desc:"Brand heat, trust and access to capital markets."}
 ],
 eras:{
  a:{
   name:"Survival Era", years:"2008–2013", start:{cash:28, prod:35, conf:50}, deep:true, stock0:3,
   intro:"October 2008. Lehman is dead, credit markets are frozen, and Tesla has delivered fewer than 50 Roadsters — each one costing more to build than its sticker price. Payroll clears for three more weeks. Your divorce is in the papers, SpaceX has just had its third rocket failure, and somewhere in Detroit, executives are laughing at you. Every choice you make from here ripples forward. Nothing is forgotten.",
   scenarios:[
    {id:"xmas", year:"DEC 2008", title:"Christmas Eve",
     text:"Your CFO's spreadsheet has a cell highlighted in red: the date Tesla dies. It's in December. You have roughly $40M left from the PayPal fortune — but SpaceX needs money too, and it just won a NASA contract it can't execute while broke. Your existing investors are waiting to see if YOU still believe.",
     voice:"Antonio Gracias, board member: \"Whatever you put in, they'll match. But they're watching your hands, not your mouth.\"",
     choices:[
      {label:"Split nothing. Every last personal dollar into Tesla, and dare investors to match it", fx:{cash:+18,conf:+14}, set:["allin"],
       result:"You borrow money for rent. The round closes at 6pm on Christmas Eve — hours before insolvency. Word spreads through the Valley: this founder will go down with the ship, so the ship probably won't go down.",
       hist:"Real: Musk closed Tesla's Series E on Dec 24, 2008, putting in essentially everything he had left."},
      {label:"Quietly shop Tesla to the giants — Daimler, Toyota, anyone", fx:{cash:+8,conf:-15}, set:["desperate"],
       result:"The bankers promise discretion. Bankers always do.",
       hist:""},
      {label:"Amputate to survive: cut a third of staff, halt Roadster, hibernate", fx:{cash:+10,prod:-15,conf:-8}, set:["gutted"],
       result:"The company lives, smaller and colder. Roadster deposit-holders — who paid $100k for cars that don't exist — start a forum thread titled 'Where is my money?'. It gets long.",
       hist:""}
     ]},
    {id:"leak", year:"JAN 2009", title:"The Leak", cond:"desperate",
     text:"It took eleven days. 'TESLA SEEKS BUYER' is on the front page of the Journal. Suppliers move you to cash-on-delivery overnight. Three VPs have headhunter lunches this week. The sale process you started is now a public deathwatch — and the only bid on the table values Tesla at less than its deposits liability.",
     voice:"Your comms chief: \"We can't kill the story. We can only change what the story is about.\"",
     choices:[
      {label:"Kill the process publicly: 'Tesla is not for sale, and here's my own money to prove it'", fx:{cash:+6,conf:+10}, set:["allin"],
       result:"Expensive theater — you have to actually write the check to make the words true. But the deathwatch ends, and you've accidentally learned the first rule of this job: conviction is a currency."},
      {label:"Take the lowball bid before it gets worse", fx:{cash:+12,conf:-20}, set:["sold_soul"],
       result:"You're now a division president with a retention package. The mission survives on a corporate slide deck, somewhere after 'synergies'."},
      {label:"Leak a counter-story: secret strategic investor in late-stage talks", fx:{conf:+4},
       result:"It buys two weeks. It had better become true within three — you've now made the Daimler conversation existential."}
     ]},
    {id:"daimler", year:"MAY 2009", title:"The Germans Are in the Lobby",
     text:"Daimler — the company that invented the automobile — wants 10% of yours for $50M, plus battery packs for the electric Smart. Their engineers spent two days crawling through your Roadster pack and left impressed, which Germans signal by frowning slightly less. Your board is split: it's validation, or it's letting a predator study you from the inside.",
     alt:[{if:"desperate", text:"Daimler is back — but they've read the headlines. The offer is now $50M for 10%, take it or keep explaining your funeral coverage to suppliers. Their lead negotiator orders the same lunch every day and never once mentions your troubles, which is somehow worse."}],
     voice:"JB Straubel, CTO: \"Their battery program is years behind ours. They need us more than they'll ever say out loud.\"",
     choices:[
      {label:"Take the money and the partnership — credibility compounds", fx:{cash:+15,prod:+5,conf:+15}, set:["daimler"],
       result:"The press release lands like a defibrillator. Suppliers reopen credit lines the same week. A 120-year-old empire just told the world your battery tech is real.",
       hist:"Real: Daimler's May 2009 investment is the deal Musk credits with saving Tesla."},
      {label:"Counter hard: less equity, bigger supply contract — make them a customer, not an owner", fx:{cash:+8,prod:+10,conf:+6}, set:["daimler"],
       result:"They respect the audacity, barely. Less cash now, but building packs to Stuttgart's tolerances forces a manufacturing discipline your startup never had. That education will pay off somewhere unexpected."},
      {label:"Walk away — nobody studies our cell architecture from the inside", fx:{cash:-8,conf:-5}, set:["no_daimler"],
       result:"Independence has a burn rate. Yours is now measured in weeks again, and the 'walking dead' whispers resume."}
     ]},
    {id:"fumes", year:"AUG 2009", title:"Running on Fumes", cond:"no_daimler",
     text:"This is what turning down $50M feels like: you're personally guaranteeing supplier invoices, and your head of HR asks — gently — whether the next payroll is 'fully certain'. The mission doesn't pay salaries. Something has to give this month.",
     choices:[
      {label:"License Roadster powertrain IP to an Asian OEM for fast cash", fx:{cash:+12,conf:-4,prod:-3},
       result:"The money lands. So does the knowledge transfer — in three years, a suspiciously familiar battery architecture will appear at a Shanghai auto show."},
      {label:"Convert customer deposits into discounted equity — make owners shareholders", fx:{cash:+10,conf:+6},
       result:"Legally hairy, emotionally brilliant. Your most fanatical customers become your most fanatical investors. The forums switch from 'where is my car' to 'where do I buy more'."},
      {label:"Another personal loan against SpaceX stock", fx:{cash:+8,conf:+3}, set:["allin"],
       result:"You are now leveraged against two companies that have never turned a profit, secured by each other. Your accountant develops a facial tic."}
     ]},
    {id:"doe", year:"JUN 2009", title:"The Government Option",
     text:"The Department of Energy offers $465M at near-zero interest under a program written to retool Detroit. Strings attached: milestones, audits, and a political target painted on your back the size of a Model S. Solyndra has taken similar money. You have a feeling about how that's going to age.",
     voice:"Your CFO: \"It's the cheapest capital we will ever be offered in our lives. Take it before someone in Washington changes their mind.\"",
     choices:[
      {label:"Take all $465M — fund the Model S properly", fx:{cash:+20,prod:+10,conf:+4}, set:["doe"],
       result:"The Model S program goes from 'aspiration' to 'funded program with milestones'. Fox News learns your name. A fair trade.",
       hist:"Real: Tesla took $465M in 2009 under the ATVM program."},
      {label:"Take half — keep the leash short", fx:{cash:+10,prod:+5,conf:+2}, set:["doe"],
       result:"Half the money, all of the politics. Washington doesn't do partial credit."},
      {label:"Refuse. Government money is government control", fx:{cash:-12,prod:-8,conf:+4}, set:["no_doe"],
       result:"The libertarian wing of your fanbase erupts in applause that pays for nothing. Model S development slides six months right."}
     ]},
    {id:"nummi", year:"APR 2010", title:"A Cathedral, Slightly Used",
     text:"Fremont. Five and a half million square feet of factory — the old GM-Toyota NUMMI plant, built for half a million cars a year. It cost a billion dollars; Toyota will let it go for $42M and they'll invest $50M in Tesla on top, because Akio Toyoda likes your Roadster and dislikes empty factories. Your entire company has built ~1,000 cars. Ever.",
     voice:"Franz von Holzhausen, design chief, on the catwalk above the silent assembly hall: \"It echoes. Imagine when it doesn't.\"",
     choices:[
      {label:"Buy the cathedral. Demand will fill it — or we'll die trying", fx:{cash:+4,prod:+20,conf:+10}, set:["fremont"],
       result:"A world-class plant for four cents on the dollar, with Toyota's blessing as a bonus. You now own more factory than ambition — temporarily.",
       hist:"Real: the Fremont deal closed in 2010 and still builds Teslas today."},
      {label:"Too much, too soon — contract manufacturing keeps us asset-light", fx:{cash:+5,prod:-8,conf:-4}, set:["contract_mfg"],
       result:"The consultants love it. You'll discover what 'asset-light' means when your product is someone else's side project."},
      {label:"Buy a modest plant sized to honest demand forecasts", fx:{prod:+8}, set:["small_plant"],
       result:"Prudent. Adult. And when lightning strikes demand later, you'll be expanding a small building instead of filling a big one."}
     ]},
    {id:"ipo", year:"JUN 2010", title:"Ring the Bell",
     text:"No American car company has gone public since Ford in 1956 — and Ford was profitable. You are not. The S-1 filing will expose every terrifying number to every short seller on Earth, forever. In exchange: ~$226M and a currency called TSLA.",
     alt:[{if:"daimler", text:"No American car company has gone public since Ford in 1956. Your bankers' best slide is the one with the three-pointed star on it — Daimler's stake lets them pitch you as 'validated by the inventors of the automobile'. The roadshow demand is real. So is the scrutiny that follows."}],
     choices:[
      {label:"Go public now, at the bottom of the worst market in decades", fx:{cash:+18,conf:+12}, set:["public"],
       fxIf:[{if:"daimler", fx:{conf:+4}, note:"Daimler's stake anchors the book — institutions that ignore startups follow Stuttgart's money."}],
       result:"TSLA opens at $17 and closes up 41%. You now have a war-chest currency and a permanent, well-funded enemy: everyone short the stock.",
       hist:"Real: Tesla IPO'd June 29, 2010 — the first US automaker IPO since Ford."},
      {label:"Stay private — quarterly earnings are a metronome for cowards", fx:{cash:+6,conf:-3}, set:["private"],
       result:"You raise less from VCs at a worse price, but nobody gets to mark your homework four times a year. You'll find out what that flexibility costs — and what it's worth — in 2013."},
      {label:"Wait a year for prettier numbers", fx:{cash:-6}, set:["public"],
       result:"The numbers improve slower than the cash burns. You IPO anyway in 2011, into a worse window, having paid a year of runway for vanity."}
     ]},
    {id:"models", year:"2011", title:"The Whole Company on One Car",
     text:"Roadster production ends this year. After it: nothing, unless the Model S ships. It must be designed, engineered, certified and MANUFACTURED — the part every startup dies on — by you. Engineering wants 2013 'to do it right'. Finance notes, dryly, that there is no 2013 without revenue in 2012.",
     alt:[{if:"contract_mfg", text:"Roadster production ends this year. The Model S must ship through your contract manufacturer — whose A-team is currently assigned to a minivan refresh for their biggest client. Your launch date is, in a real sense, their decision. Engineering wants 2013. Your partner's slot availability says maybe."}],
     voice:"Peter Rawlinson, chief engineer: \"The architecture is right. The timeline is religion. Pick which one we die for.\"",
     choices:[
      {label:"Hard date: June 2012. Move your desk to the factory floor", fx:{cash:-5,prod:+15,conf:+10},
       fxIf:[{if:"fremont", fx:{prod:+5}, note:"Owning Fremont pays off — when a line jams, you reroute it that afternoon, not after a partner committee meets."},
             {if:"contract_mfg", fx:{prod:-8}, note:"Your hard date meets your partner's change-order process. June becomes 'June, plus escalation fees'."}],
       result:"Brutal months. Engineers sleep under desks; so do you. But a deadline with a CEO attached to it behaves differently than a deadline in an email.",
       hist:"Real: first Model S deliveries — June 22, 2012."},
      {label:"Slip to 2013 — a bad first impression is forever", fx:{cash:-12,prod:+5,conf:-8},
       result:"The car gets better. The company gets poorer. Reservation-holders get Audis."},
      {label:"Ship 2012 as a stripped 'Signature-only' trickle, ramp later", fx:{cash:+3,prod:+6,conf:-2},
       result:"Technically on time. Reviewers note the $90k car has cup holders 'coming via software update', a sentence you'll spend a year living down."}
     ]},
    {id:"partner_hell", year:"2012", title:"Partner Purgatory", cond:"contract_mfg",
     text:"Your contract manufacturer just sent this quarter's quality report: paint defects up, panel gaps 'within contractual tolerance' — a phrase your designers read aloud in disbelief. Their plant manager takes four days to return calls. You don't own the line, the workers, or the urgency.",
     choices:[
      {label:"Buy your way out: terminate, eat the penalty, buy Fremont late and at full price", fx:{cash:-15,prod:+12,conf:+5}, set:["fremont"],
       result:"It costs triple what the plant cost in 2010. Tuition for the most important lesson in this industry: the factory IS the product."},
      {label:"Embed 40 Tesla engineers inside their plant, permanently", fx:{cash:-6,prod:+8},
       result:"An occupation dressed as collaboration. Quality improves; the relationship doesn't. Every improvement now requires diplomacy."},
      {label:"Accept it — ship now, fix quality in service", fx:{cash:+3,prod:+3,conf:-10},
       result:"The early-build cars become known on forums as 'Friday cars', except every day is Friday."}
     ]},
    {id:"chargers", year:"SEP 2012", title:"The Moat Nobody Asked For",
     text:"Range anxiety is the dragon guarding the EV market, and every survey says so. Your proposal: build a proprietary fast-charging network spanning the continent — hundreds of millions you barely have — and give the electricity away free, forever. The board points out that no carmaker has ever built its own fuel network. You point out that's exactly why.",
     choices:[
      {label:"Build it. Free, forever, exclusive to Tesla", fx:{cash:-12,conf:+18}, set:["superchargers"],
       fxIf:[{if:"gutted", fx:{cash:-4}, note:"The 2008 amputation cut the infrastructure team; you rebuild it now at 2012 salaries."}],
       result:"Six stations open in California to polite media confusion. Within two years, 'free coast-to-coast travel' is your most devastating sales argument and a moat rivals will spend a decade failing to copy.",
       hist:"Real: Superchargers launched Sept 2012; rivals took ~10 years to respond with comparable networks."},
      {label:"Open standard, shared cost — invite the whole industry in", fx:{cash:-4,conf:+5},
       result:"Statesmanlike. The industry attends two summits, forms a working group, and builds almost nothing. Committees don't feel range anxiety."},
      {label:"Not our job — we make cars, utilities make electrons", fx:{conf:-10}, set:["no_chargers"],
       result:"Every Model S review ends the same paragraph: magnificent car, theoretical road trips."}
     ]},
    {id:"nyt", year:"FEB 2013", title:"The Reporter and the Flatbed",
     text:"A New York Times reporter took a Model S on a cold-weather road trip and produced the single worst image in your company's history: your car, dead, on a flatbed. The review is devastating and, according to the vehicle's own logs sitting on your screen right now, partly fiction — he drove past chargers, circled a parking lot, set the cabin to tropical.",
     alt:[{if:"no_chargers", text:"A New York Times reporter tried the cold-weather road trip your sparse charging map barely supports, and got the inevitable photo: your car, dead, on a flatbed. The logs show he made mistakes. The map shows you made a bigger one. Punching back means inviting everyone to look at that map."}],
     voice:"Your comms chief, again: \"We can win this argument and still lose the photo.\"",
     choices:[
      {label:"Publish the logs. Call it what the data says it is", fx:{conf:+8},
       fxIf:[{if:"superchargers", fx:{conf:+5}, note:"Your trump card: the Supercharger map. 'He drove past free chargers to write this' is unanswerable."},
             {if:"no_chargers", fx:{conf:-6}, note:"The counterattack invites a question you can't win: past WHAT chargers, exactly?"}],
       result:"The data war goes viral. Journalists learn, permanently, that a Tesla remembers everything. Your fans mint the episode into legend; the press corps files it under grudges.",
       hist:"Real: Musk published the logs in Feb 2013; the NYT public editor conceded the reporter took 'casual and imprecise notes'."},
      {label:"Surgical rebuttal: facts, no adjectives, no war", fx:{conf:+3},
       result:"Correct, dignified, forgotten by Thursday. The flatbed photo is forever."},
      {label:"Say nothing. Send him a winter-range software update and a handwritten note", fx:{conf:-4},
       result:"Grace is invisible at internet speed. The review becomes received wisdom: EVs strand you in the cold."}
     ]},
    {id:"neardeath", year:"MAR 2013", title:"The Quiet Emergency",
     text:"Nobody outside this room knows: Model S reservations aren't converting to orders. The cash model says you have weeks, not quarters. Larry Page will take your call — Google would buy Tesla and fund the mission, with you in charge, for a while, probably. Or there's the insane option: turn all 5,000 employees into a sales force for one month and tell no one why.",
     alt:[{if:"private", text:"Nobody outside this room knows: reservations aren't converting, and as a private company you can't tap public markets quickly — your VCs want a down-round and a pound of flesh. Larry Page will take your call. Or there's the insane option: turn every employee into a closer for one month, and let conviction do what your cap table can't."}],
     voice:"Your deputy: \"If we tell people to deliver cars before quarter-end, they'll ask why. What do we say?\" — \"Tell them the truth has a delivery date.\"",
     choices:[

<script>
DATA.mercedes.eras.b = {
   name:"Transformation Era", years:"2016–2021", start:{margin:48, brand:55, future:28}, deep:true, stock0:60,
   intro:"Stuttgart, 2016. You run the most profitable luxury car company on Earth, you've just retaken the global #1 crown — and you can feel the ground moving. VW's diesel fraud has set the industry's house on fire. A company you once owned 10% of is now worth half of Daimler and climbing. In Shenzhen, firms you've never heard of are hiring battery chemists by the thousand. Gottlieb Daimler's motto is carved over your door: 'Das Beste oder nichts.' The next six years decide whether that's a promise or an epitaph.",
   scenarios:[
    {id:"diesel", year:"2016", title:"The Fire Next Door",
     text:"Volkswagen has confessed to industrial-scale emissions fraud and the regulators' floodlights are sweeping the whole industry. Your engineers, in a meeting that legal insisted go unminuted, explain that Mercedes diesels use 'thermal windows' — emissions controls that relax in cold weather. Defensible engineering, they say. The KBA and the US DOJ may use a different dictionary.",
     voice:"Your general counsel: \"Every document we write from today will someday be read aloud in a courtroom. Including this advice.\"",

    {id:"raid", year:"MAY 2017", title:"Eleven Search Warrants", cond:"fought",
     text:"05:58. Two hundred and thirty prosecutors and police officers walk into eleven Daimler sites simultaneously, including the floor below your office. They have a list of servers. Your defiant legal strategy just collided with the German criminal code, live, on the morning news.",

     choices:[

       hist:"Real: prosecutors raided 11 Daimler sites in May 2017; the US settlement came in 2020."},
      {label:"Hold the line — lawyer up harder", fx:{margin:-5,brand:-12},

    {id:"eq", year:"SEP 2016", title:"Paris, or the Art of Announcing the Future",
     text:"The Paris Motor Show. In your hall: a covered concept car and a decision. Unveil 'EQ' — a whole electric sub-brand, €10B of committed investment — or keep the cover on until you have a product that won't be benchmarked against a Model S and lose. Across the river, metaphorically, Tesla has 400,000 deposits for a car it hasn't built. They announced first and built later. It appears to be working.",
     voice:"Head of development: \"The EQC is a converted GLC, and every journalist will know it. The honest unveiling is the platform AFTER it — in 2021.\"",
     choices:[
      {label:"Unveil EQ with the full €10B commitment — the supertanker turns today", fx:{margin:-8,brand:+5,future:+14}, set:["eq"],

      {label:"Wait for a product worthy of the star — announce nothing you can't win with", fx:{margin:+5,future:-10}, set:["no_eq"],

      {label:"Skip the sub-brand — electrify the core: an electric C-Class is worth ten concepts", fx:{margin:-4,brand:+3,future:+10}, set:["integrated"],

    {id:"eqc_flop", year:"2019", title:"The Verdict on the EQC", cond:"eq",
     text:"Your first EQ product is out, and the reviews have a theme: a fine Mercedes, a mediocre EV. Less range than a Model 3 that costs less, a converted combustion platform, and US sales so slow you're weighing whether to import it at all. The €10B promise of Paris now has a face, and it's polite disappointment.",
     voice:"A dealer principal from Munich, at the annual conference, into a live microphone: \"My customers ask me why the future drives shorter than the past.\"",
     choices:[
      {label:"Own it publicly: 'transition product' — and pull the dedicated EV platform forward a full year", fx:{margin:-8,future:+12},

    {id:"empty_stand", year:"2019", title:"The Empty Space on the Stand", cond:"no_eq",
     text:"Frankfurt Motor Show. Audi has the e-tron, Porsche has the Taycan, even Volkswagen has an ID-something. Mercedes has a hybrid S-Class and a concept under silk. An analyst from Bernstein asks, in the open Q&A, with cameras running: 'Is Mercedes-Benz planning to participate in the electric century?' The room laughs. It is not a friendly laugh.",
     choices:[
      {label:"Answer with a date and a number: dedicated EV platform, 2021, and a board obligated to it", fx:{margin:-6,future:+12}, set:["eq"],
       result:"Late, therefore expensive, therefore credible — markets know panic-spending when they see it and this isn't; it's a plan with a deadline. The laughter stops. The work begins."},
      {label:"Deflect with strength: record margins fund whatever future we choose, whenever we choose it", fx:{margin:+5,future:-8},
       result:"True, and fatal in the retelling. 'Whenever we choose' becomes the analyst note title. Your stock starts trading at a 'transition risk' discount that costs more than an EV program would."},
      {label:"Buy your way in: acquire an EV startup with a working platform", fx:{margin:-12,future:+8},

    {id:"geely", year:"FEB 2018", title:"The Shareholder You Didn't Choose",
     text:"Li Shufu — the founder of Geely, the man who bought Volvo when Detroit was laughing at China — has quietly assembled 9.69% of Daimler through derivatives structured precisely to avoid disclosure thresholds. Perfectly legal, completely deliberate, and discovered by you via a regulatory filing like everyone else. Your largest shareholder is now a Chinese competitor, and Berlin is calling.",

     choices:[

       result:"Months of careful dinners produce the answer: Smart — your beloved money-loser — reborn as a 50/50 EV brand, engineered in China, designed in Stuttgart. He gets prestige; you stop losing €500M a year on cute cars.",

      {label:"Go deeper: invite Geely into joint engine and EV development", fx:{margin:+3,brand:-6,future:+10}, set:["geely_deep"],

    {id:"helm", year:"MAY 2019", title:"The Keys to the Kingdom",
     text:"Dieter Zetsche hands over after thirteen years, to a standing ovation and two unspoken profit warnings. You now run Daimler. The inheritance: record revenue, falling profit, 300,000 employees, a cost base built for a world that's ending, and a transformation bill nobody has honestly added up. Your first all-hands is Thursday. What's the message?",
     voice:"Your CFO, first one-on-one: \"I'll give you the real number: we spend €1.4B more per year than the company we need to be. Every month you wait costs €120M and gets harder to fix.\"",
     choices:[
      {label:"The hard truth: €1.4B cost cut, ~10,000 jobs, every euro saved goes to electric and software", fx:{margin:+10,brand:-3,future:+8}, set:["lean"],
       result:"The works council calls it brutal; you call it arithmetic; both are right. Shrinking the old to fund the new is the whole job now — you've just said it out loud first.",
       hist:"Real: Källenius announced exactly this in November 2019."},
      {label:"Continuity and calm: no shocks, protect employment, trust the cycle", fx:{margin:-12,brand:+3,future:-5},

    {id:"covid", year:"MAR 2020", title:"The World Stops",
     text:"Pandemic. Every plant from Sindelfingen to Tuscaloosa is dark, showrooms are locked, and the CFO's liquidity chart has developed a cliff. Rivals are lining up for state aid. Your treasury team can secure a €12B credit line by Friday — if you decide today.",
     alt:[{if:"lean", text:"Pandemic. Every plant is dark — but your November cost surgery means the patient entered this crisis lean, with months more liquidity than rivals. Painful decisions, it turns out, compound like interest. The €12B credit line is still on offer. The question is what you do with strength while competitors negotiate for survival."}],

             {if:"geely_ally", fx:{future:+3}, note:"Your China relationships keep parts and sales flowing while rivals' channels seize."}],
       result:"You never fully draw the line. Luxury demand comes roaring back — wealthy customers, it emerges, spent lockdown shopping. The crisis you prepared for becomes the springboard you didn't expect.",
       hist:"Real: Daimler secured a €12B facility in April 2020; the recovery outran every forecast."},

      {label:"Use the fog of crisis: close the plants that could never be closed in peacetime", fx:{margin:+6,brand:-6,future:+5},
       result:"Never waste a catastrophe. The restructuring of a decade happens in six months, and the bitterness will last exactly as long as the savings."}
     ]},
    {id:"capital", year:"OCT 2020", title:"Economics of Desire",
     text:"Strategy day. Three complete plans on the table for the post-COVID decade. One: retreat upmarket — S-Class, Maybach, AMG, G-Class — fewer cars, indecent margins. Two: defend every segment, including the compacts you fought to win. Three: torch the combustion budget entirely and go all-in electric. You get one.",
     voice:"Your strategy chief: \"The A-Class buyer gives us 4% margin and brand dilution. The G-Wagen buyer gives us 25% and a waiting list. This is not a hard chart to read.\"",
     choices:[
      {label:"Luxury-first. 'We will build fewer cars and mean more'", fx:{margin:+12,brand:+10,future:-3}, set:["luxury"],

    {id:"software", year:"JUN 2020", title:"The Brain of the Car",
     text:"Every future Mercedes is a computer wearing a body. VW has hurled ten thousand people at in-house software and produced, so far, delayed launches and a CEO casualty. Google offers a turnkey brain — beautiful, instant, and theirs. Your own MB.OS plan needs 3,000 engineers, four years, and several miracles. NVIDIA's Jensen Huang, meanwhile, will sell compute to anyone with taste.",
     voice:"Your CTO: \"Whoever owns the operating system owns the customer. Whoever owns the customer owns the margin. After that it's just sheet metal.\"",
     choices:[
      {label:"Build MB.OS in-house; partner with NVIDIA for the silicon and autonomy stack", fx:{margin:-8,brand:+3,future:+14}, set:["mbos"],
       result:"Slow, costly, sovereign. Hiring 3,000 software engineers into Swabia requires salary bands that scandalize HR — but the brain of the car stays in Stuttgart.",
       hist:"Real: the Mercedes–NVIDIA partnership was announced June 2020; MB.OS targeted mid-decade."},

    {id:"data_call", year:"2021", title:"Mountain View Calls", cond:"google_os",
     text:"The Google partnership has gone smoothly, which should have been the warning. The renewal terms arrive: deeper data sharing — driving patterns, location history, in-car purchases — in exchange for better terms. Your data officer points out you no longer fully know what your own cars tell California about your customers. Several of those customers are German privacy regulators' favorite constituents.",
     choices:[

      {label:"Sign. The product is winning; philosophy is a luxury", fx:{margin:+6,brand:-6},

    {id:"eqs", year:"APR 2021", title:"The Flagship Question",
     text:"The EQS is ready: 770km of range, a drag coefficient of 0.20 — the slipperiest production car ever made — and a 56-inch Hyperscreen. It is also, your designers concede behind closed doors, a jellybean. Aerodynamics ate the stately three-box silhouette that has said 'S-Class' for fifty years. Engineering is proud. Design is split. The customer clinics in China are... polite.",
     alt:[{if:"luxury", text:"The EQS is ready, and it has a strategy problem dressed as a design problem: your whole pivot says 'presence, prestige, desire' — and the most aerodynamic production car ever made looks like a beautifully engineered bar of soap. The clinics in China, where your luxury strategy lives or dies, keep using the word 'taxi'. Engineering is proud. The strategy deck is nervous."}],
     choices:[
      {label:"Ship the aero pod — let physics be the new prestige", fx:{margin:+3,brand:-5,future:+10},

       result:"A technical triumph with a sales-floor problem: S-Class buyers want to be seen arriving, not measured in wind tunnels. The reviews say 'remarkable'; the order bank says 'hmm'.",

      {label:"Delay two years — rebody it with S-Class presence", fx:{margin:-6,brand:+6,future:+2},
       result:"The car that finally ships is unmistakably a Mercedes, and unmistakably late: Lucid and Tesla split the 'first luxury EV flagship' headlines you paid a decade for."},
      {label:"Ship it AND keep the combustion S-Class as the true flagship, indefinitely", fx:{margin:+8,brand:+3},

    {id:"split", year:"FEB 2021", title:"Cutting the Giant in Two",
     text:"The project codename is 'Focus': spin off Daimler Truck — the largest truck maker on Earth, your industrial backbone since 1896 — into an independent company, and rename what remains 'Mercedes-Benz Group'. The bankers' math says two focused companies outvalue one conglomerate by billions. The historians' math says you're signing away half the company's soul. Both maths are correct.",
     choices:[
      {label:"Execute the split — pure-play luxury, pure-play trucks", fx:{margin:+10,brand:+6,future:+6}, set:["spun"],
       result:"December 2021: Daimler Truck rings its own bell, both stocks re-rate, and 'Daimler AG' — the name itself — passes into history under your signature. Focus, it turns out, was worth more than heritage.",

      {label:"Keep the conglomerate — scale is armor in the storms ahead", fx:{margin:-3,future:-5},

    {id:"chips", year:"2021", title:"Triage by Semiconductor",
     text:"The chip shortage has reduced your production planning to battlefield medicine: you will receive chips for roughly 70% of planned volume, and you choose who lives. One spreadsheet column shows margin per chip: a G-Class consumes the same scarce silicon as an A-Class and returns six times the profit. The works council has seen the same spreadsheet and drawn the opposite conclusion.",
     choices:[
      {label:"Feed the top: S-Class, Maybach, AMG, G — maximum profit per chip", fx:{margin:+15,brand:+4},

       result:"Record profits on shrunken volume — scarcity, it turns out, is a luxury strategy that enforces itself. A heretical thought takes root on the board: what if we just... kept volumes low?",
       hist:"Real: Mercedes prioritized high-margin models through the shortage and posted record 2021 results."},
      {label:"Share the pain evenly across every model line", fx:{margin:-6},
       result:"Fair to every factory, optimal for none. The all-segments compromise produces all-segment waiting lists and the year's most forgettable financials."},
      {label:"Prioritize EVs — protect CO2 compliance and the transformation story", fx:{margin:-3,future:+8},
       fxIf:[{if:"evfirst", fx:{future:+4}, note:"All-in means all-in: the EV-first allocation proves the pledge was load-bearing, and the org notices."}],
       result:"You buy regulatory peace and EV momentum with the fattest margins in the company. The CFO signs it off the way one signs off a dental procedure."}
     ]},
    {id:"abudhabi", year:"DEC 2021", title:"Five Laps in Abu Dhabi",
     text:"The F1 season finale. Lewis Hamilton is cruising to a record eighth title in your silver car when a late safety car is handled — by the race director, improvising — in a way that hands Max Verstappen the championship on the final lap. Hundreds of millions are watching. Your team principal is screaming on the radio. You have a protest window measured in hours, and a brand position measured in decades.",
     voice:"Toto Wolff, by phone, voice flat: \"We were robbed in front of the whole world. Tell me whether we fight in a courtroom or win on the track.\"",
     choices:[

      {label:"Withdraw the appeal with one cold sentence, and let the silence indict them", fx:{brand:+8},
       result:"'We walked away because the sport needed us to be bigger than its mistake.' Hamilton's dignified fury and your restraint read as class at planetary scale. The FIA quietly restructures race control anyway — your point, made for free.",
       hist:"Real: Mercedes withdrew its appeal; the FIA replaced the race director within months."},
      {label:"Channel it commercially: 'still the team to beat' — re-sign Hamilton, announce the W13 early", fx:{brand:+3,margin:+2},
       result:"Brisk, professional, slightly bloodless. The sporting wound closes; the marketing makes sure a scar stays visible, on purpose."}
     ]},
    {id:"pledge", year:"JUL 2021", title:"The Promise",
     text:"Strategy update day, and the world wants a date. Regulators, investors, activists — all demanding to know when Mercedes goes all-electric. Your draft says 2030. Legal wants the phrase 'where market conditions allow' inserted after it. Four words that change a promise into a posture — or, depending on the decade you get, into wisdom.",
     alt:[{if:"evfirst", text:"Strategy update day. Having already torched the combustion R&D budget, the pledge writes itself — the only question is whether you say the unconditional version out loud and make it contractual with the future. Legal still wants their four magic words: 'where market conditions allow'. Your conviction wants them deleted."}],
     choices:[

       result:"Ambition with an exit row. The caveat will do heavy lifting in difficult years — but the capital reallocation it unlocks today is real and enormous.",

      {label:"No date. Technology-neutral, customer-led, slogan-free", fx:{margin:+5,future:-8},
       result:"Intellectually defensible, strategically lonely. Rivals' dates — even ones they'll miss — anchor every comparison chart, and you're the blank cell."},
      {label:"2030, hard stop, no caveats — burn the boats", fx:{margin:-5,brand:+3,future:+10},
       result:"Total conviction, zero flexibility. If EV adoption wobbles, this sentence will attend every earnings call you ever host, sitting in the front row."}
     ]},
    {id:"decade", year:"DEC 2021", title:"What the Star Means Now",
     text:"Year's end. The company is renamed, refocused, and — by the numbers — triumphant: record margins, a luxury strategy validated by accident and design alike. Yet you know the truth under the numbers: software is still years behind Palo Alto, the Chinese brands are no longer coming — they've arrived, and the next decade will be harder than the last. The board asks for your defining bet, the one that outlives your contract.",
     choices:[
      {label:"Desirability above volume — become the world's most valuable luxury brand, full stop", fx:{margin:+10,brand:+12},

             {if:"luxury", fx:{brand:+4}, note:"Two years of consistent upmarket signals mean the world already believes you — the bet compounds."}],
       result:"Fewer, better, more expensive, forever. You're managing decline in units and growth in everything that actually matters — a trick only the greatest luxury houses ever pull off.",
       hist:"Real: this remains Mercedes-Benz's stated strategy."},
      {label:"Out-Tesla Tesla: software, autonomy, direct sales — a tech company with a heritage problem", fx:{margin:-8,future:+14},
       fxIf:[{if:"mbos", fx:{future:+5}, note:"MB.OS gives the tech bet a spine — you're scaling something that exists, not promising something that doesn't."},
             {if:"google_os", fx:{future:-5}, note:"Hard to out-Tesla anyone when your operating system answers to Mountain View."}],
       result:"A decade-long sprint against companies born without legacy costs, dealer networks, or works councils. Expensive, uncertain — and possibly the only version of the future where Mercedes still sets the pace rather than the price."},

             {if:"geely_foe", fx:{future:-4}, note:"The partner you froze out in 2018 takes your call, eventually, on terms that remember everything."}],

const TICKER = {
 tesla:["GM kills the EV1 — again, in spirit","Analyst: 'niche product for wealthy environmentalists'","Gas prices fluctuate; op-eds follow","Nikola Tesla still uncredited, still dead","Detroit exec: 'we could do this anytime we want'","Battery costs fall 8% — nobody notices","Short interest hits record — again","Reddit forum argues about panel gaps for 400 comments"],

};
const ACH = [
 {id:"iron",   ic:"🛡️", nm:"Iron Hands",      ds:"Finish with every KPI at 70+."},
 {id:"brink",  ic:"🎲", nm:"The Brink",        ds:"Survive after any KPI fell to 10 or below."},
 {id:"hist",   ic:"📜", nm:"The Historian",    ds:"Match real history in 75%+ of decisions."},
 {id:"mav",    ic:"🃏", nm:"The Maverick",     ds:"Defy real history in 70%+ of decisions — and survive."},
 {id:"moon",   ic:"🚀", nm:"Moonshot",         ds:"Grow the stock to 4× its starting price."},
 {id:"board",  ic:"🤝", nm:"Untouchable",      ds:"Finish with board patience above 80."},
 {id:"google", ic:"🔍", nm:"The Other Timeline", ds:"Sell Tesla to Google. See what happens."},
 {id:"soul",   ic:"🏳️", nm:"Winter of 2009",  ds:"Sell Tesla in the darkest hour."},
 {id:"legend", ic:"🏆", nm:"Legendary",        ds:"Earn the Legendary CEO ending."}
];
</script>
<script>
const app = document.getElementById('app');
let S = null;
let soundOn = true;

/* ---------- audio ---------- */
let AC = null;
function beep(freq, dur, type, vol){
  if(!soundOn) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol||.06, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime+(dur||.12));
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+(dur||.12));
  }catch(e){}
}
const sfx = {
  click(){ beep(520,.07,'triangle'); },
  good(){ beep(523,.1,'sine'); setTimeout(()=>beep(784,.14,'sine'),90); },
  bad(){ beep(196,.2,'sawtooth',.05); },
  news(){ beep(880,.08,'square',.04); setTimeout(()=>beep(880,.08,'square',.04),140); },
  win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.22,'sine'),i*140)); },
  lose(){ [392,330,262,196].forEach((f,i)=>setTimeout(()=>beep(f,.25,'sawtooth',.05),i*170)); }
};
function toggleSound(){
  soundOn = !soundOn;
  document.getElementById('mute').textContent = soundOn ? '🔊 sound' : '🔇 muted';
  if(soundOn) sfx.click();
}

/* ---------- persistence ---------- */
const SAVE_KEY = 'drive_v3_save';
function loadSave(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY))||{ach:{},runs:0,best:0}; }catch(e){ return {ach:{},runs:0,best:0}; } }
function commitSave(sv){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(sv)); }catch(e){} }

/* ---------- helpers ---------- */
function clamp(v){ return Math.max(0, Math.min(100, v)); }
function evalCond(cond){
  if(!cond) return true;
  return cond.split('&&').every(t=>{ t=t.trim(); return t[0]==='!' ? !S.flags[t.slice(1)] : !!S.flags[t]; });
}
function money(v){ return '$'+(v>=100?Math.round(v):v.toFixed(2)); }

/* ---------- screens ---------- */
function titleScreen(){
  S = null;
  document.body.className = '';
  const sv = loadSave();
  const earned = Object.keys(sv.ach).length;
  app.innerHTML = `
  <div class="screen center" style="margin-top:48px">
    <div class="fade-seq">
      <div class="kicker">A STRATEGY SAGA IN TWO EMPIRES</div>
      <h1 class="display" style="font-size:3rem;margin-top:10px">D R I V E</h1>
      <p class="dim" style="max-width:520px;margin:14px auto 0">You will be offered the corner office at two of the most consequential car companies on Earth. Real history. Real stakes. Your past follows you — every decision echoes forward, the market keeps score in real time, and the board is always watching.</p>
      <div style="margin-top:18px">
        <span class="pill">🦋 Butterfly-effect campaigns</span><span class="pill">📈 Live stock market</span><span class="pill">🏛️ Board patience</span><span class="pill">🏆 ${earned}/${ACH.length} achievements</span>
      </div>
      <div style="max-width:440px;margin:22px auto 0">
        <button class="btn primary" onclick="sfx.click();offerScreen()"><span class="t" style="text-align:center">📨 &nbsp;Open your job offers</span></button>
        ${earned?`<button class="btn ghost" onclick="sfx.click();trophyScreen()">🏆 Trophy room</button>`:''}
      </div>
      ${sv.runs?`<p class="dim" style="margin-top:16px;font-size:.8rem">Careers played: ${sv.runs} · Best legacy score: ${sv.best}</p>`:''}
    </div>
  </div>`;
}

function trophyScreen(){
  const sv = loadSave();
  app.innerHTML = `<div class="screen">
    <div class="kicker">TROPHY ROOM</div>
    <h1>Achievements</h1>
    <div class="card">
      ${ACH.map(a=>`<div class="ach ${sv.ach[a.id]?'':'locked'}"><div class="ic">${a.ic}</div><div><div class="nm">${a.nm}</div><div class="ds">${sv.ach[a.id]?a.ds:'???'}</div></div></div>`).join('')}
    </div>
    <button class="btn ghost" onclick="sfx.click();titleScreen()">← Back</button>
  </div>`;
}

function offerScreen(){
  document.body.className = '';
  app.innerHTML = `<div class="screen">
    <div class="kicker">TWO ENVELOPES, ONE DESK</div>
    <h1>The Offers</h1>` +
    ['tesla','mercedes'].map(k=>{
      const c = DATA[k];
      return `<div class="card glow" onmouseenter="document.body.className='${c.theme}'">
        <h2>${c.logo} ${c.name}</h2>
        <p class="dim">${c.pitch}</p>
        <p style="margin-top:10px;font-size:.85rem"><span class="dim">Your KPIs as CEO:</span><br>${c.kpis.map(x=>`<b>${x.label}</b> — ${x.desc}`).join('<br>')}</p>
        <button class="btn" onclick="sfx.click();eraScreen('${k}')"><span class="t">Accept the ${c.short} offer →</span></button>
      </div>`;
    }).join('') + `</div>`;
}

function eraScreen(co){
  const c = DATA[co];
  document.body.className = c.theme;
  app.innerHTML = `<div class="screen">
    <div class="kicker">${c.logo} ${c.name.toUpperCase()}</div>
    <h1>Choose Your Era</h1>` +
    Object.entries(c.eras).map(([ek,e])=>`
      <div class="card">
        <h2>${e.name} <span class="dim" style="font-weight:400;font-size:1rem">· ${e.years}</span></h2>
        ${e.deep?'<span class="pill" style="color:var(--gold);border-color:#5c4a1a">🦋 Butterfly-effect campaign — hidden scenarios, echoing consequences</span>':'<span class="pill">Classic campaign</span>'}
        <p class="dim" style="margin-top:10px">${e.intro}</p>
        <button class="btn" onclick="sfx.click();startGame('${co}','${ek}')"><span class="t">Take the helm in ${e.years.slice(0,4)} →</span></button>
      </div>`).join('') +
    `<button class="btn ghost" onclick="sfx.click();offerScreen()">← Back to offers</button></div>`;
}

function startGame(co, ek){
  const e = DATA[co].eras[ek];
  S = { co, ek, idx:0, played:0, kpi:{...e.start}, flags:{}, log:[], lastFx:null,
        stock:e.stock0, stockHist:[e.stock0], board:65, brink:false, histMatch:0, histTotal:0,
        usedEvents:[], lastWasEvent:false };
  renderScenario();
}

/* ---------- HUD ---------- */
function spark(){
  const h = S.stockHist;
  if(h.length<2) return '<svg viewBox="0 0 100 34" preserveAspectRatio="none"><line x1="0" y1="17" x2="100" y2="17" stroke="var(--line)" stroke-width="1"/></svg>';
  const mn = Math.min(...h), mx = Math.max(...h), rng = (mx-mn)||1;
  const pts = h.map((v,i)=>`${(i/(h.length-1)*100).toFixed(1)},${(30-(v-mn)/rng*26+2).toFixed(1)}`).join(' ');
  const up = h[h.length-1] >= h[0];
  return `<svg viewBox="0 0 100 34" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${up?'var(--good)':'var(--bad)'}" stroke-width="1.6" vector-effect="non-scaling-stroke"/></svg>`;
}
function hud(c){
  const last = S.stockHist.length>1 ? S.stockHist[S.stockHist.length-2] : S.stock;
  const chg = ((S.stock-last)/last*100);
  const bcol = S.board>=60?'var(--good)':S.board>=30?'var(--warn)':'var(--bad)';
  return `<div class="hud">` + c.kpis.map(k=>{
    const v = S.kpi[k.key];
    const col = v>=60?'var(--good)':v>=30?'var(--warn)':'var(--bad)';
    const d = S.lastFx ? S.lastFx[k.key]||0 : 0;
    const ds = d ? `<span class="delta ${d>0?'good':'bad'}">${d>0?'+':''}${d}</span>` : '';
    return `<div class="kpi ${d<0?'hit':''}"><div class="name">${k.label}</div><div class="val">${v}${ds}</div>
      <div class="bar"><i style="width:${v}%;background:${col}"></i></div></div>`;
  }).join('') +
  `<div class="stockbox"><div class="name" style="font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px">${S.co==='tesla'?'TSLA':'DAI'} · Stock</div>
    <div class="val" style="font-size:1.35rem;font-weight:750;margin:3px 0">${money(S.stock)} <span class="delta ${chg>=0?'good':'bad'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(1)}%</span></div>
    ${spark()}</div></div>
  <div class="boardrow"><span>🏛️ Board patience</span><div class="bar"><i style="width:${S.board}%;background:${bcol}"></i></div><span>${S.board}</span></div>`;
}
function tickerBar(){
  const pool = TICKER[S.co];
  const picks = [];
  for(let i=0;i<4;i++) picks.push(pool[(S.played*3+i*2)%pool.length]);
  picks.push(`${S.co==='tesla'?'TSLA':'DAI'} ${money(S.stock)}`);
  return `<div class="ticker"><div class="inner">${picks.map(p=>`<b>›</b>${p}`).join('')}</div></div>`;
}

/* ---------- flow ---------- */
function currentScenario(){
  const e = DATA[S.co].eras[S.ek];
  while(S.idx < e.scenarios.length && !evalCond(e.scenarios[S.idx].cond)) S.idx++;
  return S.idx < e.scenarios.length ? e.scenarios[S.idx] : null;
}
function remaining(e){
  let n=0; for(let i=S.idx;i<e.scenarios.length;i++) if(evalCond(e.scenarios[i].cond)) n++;
  return n;
}

function maybeEvent(){
  // ~30% chance, never twice in a row, max 3 per run, not on first/last round
  const e = DATA[S.co].eras[S.ek];
  if(S.lastWasEvent || S.usedEvents.length>=3 || S.played===0 || remaining(e)<=1) return false;
  if(Math.random() > .3) return false;
  const pool = EVENTS[S.co].filter((ev,i)=>!S.usedEvents.includes(i));
  if(!pool.length) return false;
  const ev = pool[Math.floor(Math.random()*pool.length)];
  S.usedEvents.push(EVENTS[S.co].indexOf(ev));
  S.lastWasEvent = true;
  for(const k in ev.fx) S.kpi[k] = clamp(S.kpi[k]+ev.fx[k]);
  S.lastFx = ev.fx;
  updateStock(ev.fx);
  sfx.news();
  const c = DATA[S.co];
  const dead = c.kpis.find(k=>S.kpi[k.key]<=0);
  app.innerHTML = `<div class="screen">
    ${hud(c)}
    <div class="news">
      <div class="tag">⚡ BREAKING</div>
      <h2 style="margin-top:6px">${ev.title}</h2>
      <p class="dim">${ev.text}</p>
      <div class="outcome" style="border-color:var(--warn)">${ev.up}</div>
      ${dead
        ? `<button class="btn" onclick="endScreen('kpi','${dead.key}')"><span class="t bad">Face the board…</span></button>`
        : `<button class="btn" onclick="sfx.click();renderScenario(true)"><span class="t">Back to the desk →</span></button>`}
    </div></div>`;
  window.scrollTo(0,0);
  return true;
}

function renderScenario(skipEvent){
  const c = DATA[S.co], e = c.eras[S.ek];
  if(!skipEvent && maybeEvent()) return;
  S.lastWasEvent = false;
  const sc = currentScenario();
  if(!sc){ endScreen('end'); return; }
  let text = sc.text;
  if(sc.alt) for(const a of sc.alt) if(evalCond(a.if)){ text = a.text; break; }
  const total = S.played + remaining(e);
  app.innerHTML = `<div class="screen">
    <div><span class="pill">${c.logo} <b>${c.short}</b></span><span class="pill">${e.name}</span><span class="pill">Decision <b>${S.played+1}</b> of ~${total}</span></div>
    ${hud(c)}
    ${tickerBar()}
    <div class="card glow">
      <div class="year">${sc.year}</div>
      <h2>${sc.title}</h2>
      <p class="scen-text">${text}</p>
      ${sc.voice?`<div class="voice">${sc.voice}</div>`:''}
      ${sc.choices.filter(ch=>evalCond(ch.cond)).map(ch=>`<button class="btn" onclick="choose(${sc.choices.indexOf(ch)})"><span class="t">${ch.label}</span></button>`).join('')}
    </div></div>`;
  S.lastFx = null;
  window.scrollTo(0,0);
}

function updateStock(fx){
  const sum = Object.values(fx).reduce((a,b)=>a+b,0);
  let pct = sum/55 + (Math.random()-.5)*.06;
  pct = Math.max(-.30, Math.min(.40, pct));
  S.stock = Math.max(.5, S.stock*(1+pct));
  S.stockHist.push(S.stock);
}

function choose(i){
  const c = DATA[S.co], e = c.eras[S.ek], sc = e.scenarios[S.idx], ch = sc.choices[i];
  const fx = {...ch.fx};
  const notes = [];
  if(ch.fxIf) for(const f of ch.fxIf) if(evalCond(f.if)){
    for(const k in f.fx) fx[k] = (fx[k]||0) + f.fx[k];
    notes.push(f.note);
  }
  for(const k in fx) S.kpi[k] = clamp((S.kpi[k]||0) + fx[k]);
  if(ch.set) for(const fl of ch.set) S.flags[fl] = true;
  const echoes = [];
  if(ch.echo) for(const ec of ch.echo) if(evalCond(ec.if)) echoes.push(ec.text);
  S.lastFx = fx;
  S.played++;
  S.log.push({title:sc.title, choice:ch.label, hist:!!ch.hist});
  // meta systems
  S.histTotal++; if(ch.hist) S.histMatch++;
  updateStock(fx);
  const sum = Object.values(fx).reduce((a,b)=>a+b,0);
  S.board = clamp(S.board + (sum>=5?+4:sum>=0?+1:-5));
  const minK = Math.min(...c.kpis.map(k=>S.kpi[k.key]));
  if(minK < 25) S.board = clamp(S.board-4);
  if(minK <= 10) S.brink = true;
  (sum>=0?sfx.good:sfx.bad)();
  const dead = c.kpis.find(k=>S.kpi[k.key]<=0);
  const coup = S.board<=0;
  app.innerHTML = `<div class="screen">
    <div><span class="pill">${c.logo} <b>${c.short}</b></span><span class="pill">Decision <b>${S.played}</b></span></div>
    ${hud(c)}
    <div class="card">
      <div class="year">${sc.year}</div>
      <h2>${sc.title}</h2>
      <p class="dim" style="margin-top:6px">You chose: <b style="color:var(--text)">${ch.label}</b></p>
      <div class="outcome">${ch.result}</div>
      ${notes.map(n=>`<div class="echo">⟲ ${n}</div>`).join('')}
      ${echoes.map(n=>`<div class="echo">⟲ ${n}</div>`).join('')}
      ${ch.hist?`<div class="hist">📜 ${ch.hist}</div>`:`<div class="hist">📜 History took a different road here. Yours might be better — the market will decide.</div>`}
      ${dead ? `<button class="btn" onclick="endScreen('kpi','${dead.key}')"><span class="t bad">Face the board…</span></button>`
       : coup ? `<button class="btn" onclick="endScreen('coup')"><span class="t bad">The board is calling an emergency session…</span></button>`
       : `<button class="btn" onclick="sfx.click();S.idx++;renderScenario()"><span class="t">Continue →</span></button>`}
    </div></div>`;
  window.scrollTo(0,0);
}

/* ---------- endings ---------- */
function endScreen(kind, deadKey){
  const c = DATA[S.co], e = c.eras[S.ek];
  const avg = Math.round(c.kpis.reduce((a,k)=>a+S.kpi[k.key],0)/c.kpis.length);
  const stockX = S.stock/e.stock0;
  const align = S.histTotal? Math.round(S.histMatch/S.histTotal*100) : 0;
  const score = Math.round(avg*0.6 + Math.min(stockX*10,30) + S.board*0.1);
  let title, msg, icon, win=false;
  if (S.flags.sold_google){ icon='🔍'; title='ACQUIRED'; msg=`Tesla lives on as a Google division. The mission survived; the legend didn't. Business schools will debate this one forever — and so will you.`; }
  else if (S.flags.sold_soul){ icon='🏳️'; title='ABSORBED'; msg=`You sold in the dark winter of 2009. The buyer shelved the EV program in 2011 when gas got cheap. Somewhere, an alternate timeline is having more fun.`; }
  else if (kind==='kpi'){ const k=c.kpis.find(x=>x.key===deadKey); icon='🪦'; title='FIRED'; msg=`Your <b>${k.label}</b> collapsed to zero. ${S.co==='tesla'?'Tesla files for bankruptcy protection; the EV revolution is delayed a decade.':'An emergency CEO is parachuted in from BMW. The humiliation is total.'}`; }
  else if (kind==='coup'){ icon='🗳️'; title='BOARD COUP'; msg=`No single catastrophe — just a board that stopped believing. The vote is unanimous, the press release warm, the knife invisible. Your KPIs were ${avg}; your support was zero.`; }
  else if (avg>=75){ win=true; icon='🏆'; title='LEGENDARY CEO'; msg=`${S.co==='tesla'?"You didn't just save a company — you bent the entire industry toward electricity.":"You proved a century-old giant can dance. The three-pointed star has never shone brighter."}`; }
  else if (avg>=55){ win=true; icon='⭐'; title='RESPECTED CEO'; msg=`A strong tenure with real wins and survivable scars. The board renews your contract; the biography sells modestly.`; }
  else if (avg>=35){ win=true; icon='😬'; title='SURVIVOR'; msg=`You kept the lights on, barely. History will record you as a caretaker in revolutionary times.`; }
  else { win=true; icon='📉'; title='QUIETLY REPLACED'; msg=`No single disaster, just steady decline. The press release says you're "pursuing new opportunities."`; }
  (win&&avg>=55?sfx.win:sfx.lose)();
  // achievements
  const sv = loadSave();
  const unlocked = [];
  function grant(id){ if(!sv.ach[id]){ sv.ach[id]=true; unlocked.push(ACH.find(a=>a.id===id)); } }
  if(win && c.kpis.every(k=>S.kpi[k.key]>=70)) grant('iron');
  if(win && S.brink) grant('brink');
  if(win && S.histTotal>=8 && align>=75) grant('hist');
  if(win && S.histTotal>=8 && align<=30) grant('mav');
  if(win && stockX>=4) grant('moon');
  if(win && S.board>80) grant('board');
  if(S.flags.sold_google) grant('google');
  if(S.flags.sold_soul) grant('soul');
  if(title==='LEGENDARY CEO') grant('legend');
  sv.runs++; if(win && score>sv.best) sv.best=score;
  commitSave(sv);
  app.innerHTML = `<div class="screen">
    <div class="center" style="margin-top:26px">
      <div class="logo">${icon}</div>
      <h1 class="big">${title}</h1>
      <p class="dim">${c.name} · ${e.name} (${e.years})</p>
    </div>
    ${hud(c)}
    <div class="card"><p>${msg}</p></div>
    <div class="card">
      <h2>Final Report</h2>
      <div class="grid2" style="margin-top:10px">
        <div class="stat"><div class="v">${money(S.stock)}</div><div class="l">Stock (${stockX>=1?'+':''}${Math.round((stockX-1)*100)}% from ${money(e.stock0)})</div></div>
        <div class="stat"><div class="v">${score}</div><div class="l">Legacy score</div></div>
        <div class="stat"><div class="v">${align}%</div><div class="l">Matched real history</div></div>
        <div class="stat"><div class="v">${S.board}</div><div class="l">Board patience at exit</div></div>
      </div>
    </div>
    ${unlocked.length?`<div class="card glow"><h2>🏆 Unlocked</h2>${unlocked.map(a=>`<div class="ach"><div class="ic">${a.ic}</div><div><div class="nm">${a.nm}</div><div class="ds">${a.ds}</div></div></div>`).join('')}</div>`:''}
    <div class="card">
      <h2>Your Tenure</h2>
      ${S.log.map((l,i)=>`<p style="margin-top:8px;font-size:.88rem"><span class="dim">${i+1}. ${l.title}:</span> ${l.choice} ${l.hist?'<span class="dim" style="font-size:.75rem">· as history had it</span>':'<span class="goldc" style="font-size:.75rem">· your road</span>'}</p>`).join('')}
      ${e.deep?`<p class="dim" style="margin-top:14px;font-size:.8rem">Path markers: ${Object.keys(S.flags).length?Object.keys(S.flags).join(' · '):'none'} — replay differently to unlock hidden scenarios.</p>`:''}
    </div>
    <div class="grid2">
      <button class="btn" onclick="sfx.click();startGame(S.co,S.ek)"><span class="t" style="text-align:center">↻ Run it back</span></button>
      <button class="btn" onclick="sfx.click();titleScreen()"><span class="t" style="text-align:center">🏁 Title screen</span></button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

titleScreen();
</script>
</body>
</html>
