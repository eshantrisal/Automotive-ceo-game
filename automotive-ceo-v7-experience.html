<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be an Automotive CEO — v7 (Survival · Pressure · Stakes)</title>
<style>
  :root{
    --bg:#0b0e13; --panel:#141925; --panel2:#1b2231; --line:#2a3447;
    --ink:#e8edf6; --dim:#8a98b0; --gold:#e9c46a; --ice:#7fd3ff;
    --good:#4ade80; --warn:#fbbf24; --orange:#fb923c; --bad:#f87171; --accent:#6ea8fe; --violet:#b08cff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 700px at 50% -10%,#16202f,var(--bg));
    color:var(--ink);font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    line-height:1.55;min-height:100vh}
  .wrap{max-width:880px;margin:0 auto;padding:28px 20px 90px}
  .tag{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
  h1{font-size:1.55rem;margin:.2rem 0 .1rem;font-weight:800;letter-spacing:-.01em}
  .sub{color:var(--dim);font-size:.92rem;margin-bottom:22px}
  .banner{background:linear-gradient(180deg,#ffffff14,transparent);border:1px solid var(--line);
    border-radius:14px;padding:15px 18px;margin-bottom:22px;font-size:.85rem;color:var(--dim)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .co{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;
    cursor:pointer;transition:.15s;text-align:left}
  .co:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--panel2)}
  .co .logo{font-size:1.7rem}
  .co .nm{font-weight:700;margin-top:6px}
  .co .tk{font-size:.72rem;color:var(--dim);letter-spacing:1px}
  .co .pl{font-size:.78rem;color:var(--ice);margin-top:8px}

  /* Oracle */
  .oracle{background:radial-gradient(700px 320px at 50% 0%,#241a3a,transparent);
    border:1px solid var(--line);border-radius:18px;padding:30px 22px;text-align:center;margin-bottom:18px}
  .oracle .eye{font-size:2.4rem;filter:drop-shadow(0 0 16px var(--violet))}
  .oracle h2{font-size:1.5rem;margin:.4rem 0 .2rem}
  .oracle .says{color:var(--ice);font-style:italic;max-width:560px;margin:6px auto 20px;font-size:.96rem}
  .doors{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:620px;margin:0 auto}
  @media(max-width:560px){.doors{grid-template-columns:1fr}}
  .door{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 18px;
    cursor:pointer;transition:.15s;text-align:left}
  .door:hover{transform:translateY(-3px)}
  .door.hist:hover{border-color:var(--gold)}
  .door.fut:hover{border-color:var(--violet)}
  .door .dt{font-weight:800;font-size:1.05rem;margin-bottom:4px}
  .door.hist .dt{color:var(--gold)} .door.fut .dt{color:var(--violet)}
  .door .dd{font-size:.84rem;color:var(--dim)}

  /* HUD */
  .hud{position:sticky;top:0;z-index:5;background:rgba(11,14,19,.95);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:14px;padding:13px 16px;margin-bottom:16px}
  .survival{margin-bottom:12px}
  .sv-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .sv-top .l{color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-size:.68rem}
  .sv-pct{font-weight:800;font-size:1.05rem}
  .sv-bar{height:13px;background:#0c1118;border-radius:7px;overflow:hidden;box-shadow:inset 0 0 0 1px #ffffff10}
  .sv-bar i{display:block;height:100%;border-radius:7px;transition:width .55s cubic-bezier(.4,0,.2,1)}
  .sv-sub{font-size:.66rem;color:var(--dim);margin-top:4px;display:flex;justify-content:space-between}
  .hud-top{display:flex;justify-content:space-between;align-items:center;margin:2px 0 9px}
  .hud-co{font-weight:700} .hud-co small{color:var(--dim);font-weight:500}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .kpi{display:flex;align-items:center;gap:8px;font-size:.82rem}
  .kpi .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .kpi .lab{color:var(--dim);font-size:.7rem;text-transform:uppercase;letter-spacing:.4px}
  .kpi .st{font-weight:700}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 22px 10px}
  .yr{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
  .ti{font-size:1.25rem;font-weight:800;margin:4px 0 12px;letter-spacing:-.01em}
  .tx{font-size:.98rem;margin-bottom:14px}
  .voice{border-left:3px solid var(--accent);padding:8px 14px;margin:0 0 16px;color:var(--ice);
    font-style:italic;font-size:.9rem;background:#6ea8fe14;border-radius:0 8px 8px 0}
  .timer{height:6px;background:#0c1118;border-radius:4px;overflow:hidden;margin:0 0 5px}
  .timer i{display:block;height:100%;width:100%;border-radius:4px;
    background:linear-gradient(90deg,var(--good),var(--warn) 55%,var(--bad));animation:drain 22s linear forwards}
  @keyframes drain{from{width:100%}to{width:0%}}
  .timer-cap{font-size:.68rem;color:var(--dim);margin:0 0 14px;text-align:right}
  .choices{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .choice{text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:13px 15px;color:var(--ink);cursor:pointer;font-size:.92rem;transition:.13s}
  .choice:hover{border-color:var(--accent);background:#22304a}

  .res{background:#0c1118;border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin:6px 0 14px}
  .react{margin:0 0 10px}
  .react p{margin:3px 0;font-size:.86rem;color:var(--ink)}
  .react .r-up::before{content:"▲ ";color:var(--good)}
  .react .r-dn::before{content:"▼ ";color:var(--bad)}
  .res .body{font-size:.94rem;margin-top:4px}
  .bonus{background:#4ade8014;border-left:3px solid var(--good);border-radius:0 8px 8px 0;padding:8px 13px;margin:12px 0 4px;font-size:.88rem;color:#bff3d0}
  .warn-box{background:#f8717118;border-left:3px solid var(--bad);border-radius:0 8px 8px 0;padding:9px 13px;margin:12px 0 4px;font-size:.9rem;color:#ffd2d2;font-weight:600}
  .cons{border-left:3px solid var(--violet);background:#b08cff14;border-radius:0 8px 8px 0;
    padding:9px 13px;margin:12px 0 4px;font-size:.88rem;color:#d8c7ff}
  .cons b{color:#fff}
  .echo{border:1px dashed var(--violet);background:#b08cff0f;border-radius:12px;padding:12px 15px;
    margin-bottom:14px;color:#d8c7ff;font-size:.9rem}
  .echo .h{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:3px}
  .echo i{color:#e7dbff;font-style:italic}

  .btn{background:var(--gold);color:#1a1a1a;border:none;border-radius:10px;padding:11px 20px;
    font-weight:700;cursor:pointer;font-size:.92rem}
  .btn:hover{filter:brightness(1.07)}
  .btn.v{background:var(--violet);color:#160d2b}
  .btn.bad{background:var(--bad);color:#2a0d0d}
  .btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line)}

  .eralist{display:flex;flex-direction:column;gap:8px;margin:14px 0}
  .erarow{display:flex;justify-content:space-between;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:11px 14px;font-size:.9rem}
  .erarow .yy{color:var(--gold);font-size:.78rem;letter-spacing:1px}

  .end{text-align:center;padding:26px 18px}
  .end .icon{font-size:3rem}
  .end h2{font-size:1.6rem;margin:.3rem 0}
  .end .verdict{color:var(--dim);max-width:580px;margin:8px auto 18px}
  .ledger{text-align:left;max-width:640px;margin:20px auto 0}
  .ledger .lh{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:6px}
  .ledger .row{border-bottom:1px solid var(--line);padding:9px 0}
  .ledger .row .t{font-size:.9rem}
  .ledger .row .c{font-size:.82rem;color:var(--dim)}
  .ledger .row .fx{font-size:.78rem;margin-top:3px}
  .ledger .fx span{margin-right:10px}
  .pos{color:var(--good)} .neg{color:var(--bad)} .neu{color:var(--dim)}
  .foot{margin-top:26px;text-align:center}
  .synergy{border:1px solid var(--ice);background:#7fd3ff14;border-radius:12px;padding:12px 15px;margin-bottom:14px;color:#cdeaff}
  .synergy .h{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--ice);margin-bottom:3px}
  .case{text-align:left;max-width:640px;margin:8px auto 0}
  .case .sec{border-top:1px solid var(--line);padding:13px 0}
  .case .sec:first-child{border-top:none}
  .case .lbl{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:4px}
  .case .val{font-size:1rem}
  .stamp{font-size:.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--dim);
    border:1px solid var(--line);border-radius:8px;display:inline-block;padding:6px 12px;margin-bottom:8px}
</style>
</head>

const clamp = v => Math.max(0, Math.min(100, v));
const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
const shorten = (s,n=9) => { const w=s.replace(/[—–]/g," ").split(/\s+/); return w.slice(0,n).join(" ").replace(/[;,.]$/,"") + (w.length>n?"…":""); };

/* ---- TUNING (the "tough" dial) ---- */
const START_SURVIVAL = 30;   // begin on the brink — survival starts at just 30%
const EROSION        = 6;    // the relentless grind: every decision costs ground by default
const POS_SCALE      = 0.85; // good news is muted on the KPIs...
const NEG_SCALE      = 1.35; // ...bad news is amplified
const RANK_POINTS    = [16, 7, -12]; // survival points for the best / 2nd-best / worst answer
const FAST_SECS      = 10;   // answer within this AND match the analysts for the full bonus
const DITHER_SECS    = 22;   // dither past this and the board notes your hesitation
const ALIGN_BONUS    = 4, SPEED_BONUS = 5, DITHER_PEN = 3, COMBO_SURV = 8;

const toughFx = fx => { const o={}; for(const k in fx){ const v=fx[k]; o[k]= v>=0 ? Math.round(v*POS_SCALE) : Math.round(v*NEG_SCALE); } return o; };
const sum = fx => Object.values(fx).reduce((a,b)=>a+b,0);
// rank a chosen answer against its siblings by net effect: 0 = best, 1 = second, 2 = worst
function rankOf(choices, idx){
  const sums = choices.map((c,i)=>({i, s:sum(c.fx||{})}));
  const sorted = [...sums].sort((a,b)=>b.s-a.s);
  return sorted.findIndex(x=>x.i===idx);
}

/* ---------- qualitative helpers ---------- */
const STANDING = [[72,"Commanding","var(--good)"],[58,"Healthy","var(--good)"],[44,"Holding","var(--warn)"],[30,"Strained","var(--warn)"],[15,"Precarious","var(--bad)"],[0,"Critical","var(--bad)"]];
function standing(v){ for(const [t,w,c] of STANDING){ if(v>=t) return [w,c]; } return ["Critical","var(--bad)"]; }
const SURV = [[70,"Holding","var(--good)"],[50,"Exposed","var(--warn)"],[30,"Precarious","var(--orange)"],[15,"On the brink","var(--bad)"],[0,"Final warning","var(--bad)"]];
function survBand(v){ for(const [t,w,c] of SURV){ if(v>=t) return [w,c]; } return ["Final warning","var(--bad)"]; }

function reactLine(key, d){
  const a=Math.abs(d), up=d>0;
  let bank;
  if(a>=12) bank = up?["erupt in applause","are jubilant","cheer the move openly"]:["sound the alarm","are in open revolt","recoil in disbelief"];
  else if(a>=7) bank = up?["applaud the move","warm to it quickly","approve loudly"]:["frown hard","grow visibly anxious","push back hard"];
  else if(a>=3) bank = up?["nod approvingly","are quietly pleased"]:["look uneasy","hesitate","murmur doubts"];
  else bank = up?["barely notice, mildly pleased"]:["are faintly unsettled"];
  const voices = (VOICES[S.co] && VOICES[S.co][key]) || GENERIC[key];
  return { cls: up?"r-up":"r-dn", text:`${pick(voices)} ${pick(bank)}.` };
}
function genReactions(fx){
  const keys = Object.keys(fx).filter(k=>fx[k]);
  keys.sort((x,y)=>Math.abs(fx[y])-Math.abs(fx[x]));
  return keys.slice(0,3).map(k=>reactLine(k,fx[k]));
}

      for(const k in tf){ S.kpi[k]=clamp((S.kpi[k]||0)+tf[k]); }
      S.survival = clamp(S.survival + COMBO_SURV);

function choose(n){
  const e = DATA[S.co].eras.future, sc = e.scenarios[S.idx], ch = sc.choices[n];
  const elapsed = (Date.now() - S.qStart)/1000;

  // assemble raw effects (+ authored echoes), then apply the tough-world transform
  let raw = {...(ch.fx||{})};
  let consHtml = "";
  if(ch.fxIf){ for(const cif of ch.fxIf){ if(S.flags[cif.if]){
    for(const k in cif.fx){ raw[k]=(raw[k]||0)+cif.fx[k]; }
    if(cif.note) consHtml += `<div class="cons"><b>Consequence —</b> ${cif.note}</div>`;
  }}}
  const fx = toughFx(raw);
  for(const k in fx){ S.kpi[k]=clamp((S.kpi[k]||0)+fx[k]); }

  // rank the chosen answer against its siblings: 0 best · 1 second · 2 worst
  const rank = rankOf(sc.choices, n);
  const isWorst = rank===2;
  const rankHtml = rank===0
    ? `<div class="bonus">✓ <b>The strongest call on the table.</b> Of the three options, this one scored highest.</div>`
    : rank===1
    ? `<div class="cons" style="border-left-color:var(--warn);background:#fbbf2414;color:#ffe9b8"><b>A defensible call</b> — but not the best option that was available.</div>`
    : `<div class="warn-box">✗ <b>The weakest option on the table.</b> The board winces.</div>`;

  // analyst-alignment + speed bonus
  const aligned = !!ch.hist;
  let bonus = 0, bonusHtml = "";
  if(aligned && elapsed<=FAST_SECS){ bonus += ALIGN_BONUS + SPEED_BONUS;
    bonusHtml = `<div class="bonus">⚡ <b>Decisive — and aligned with the analysts' read.</b> A fast, expert-consensus call: the board's confidence jumps.</div>`; }
  else if(aligned){ bonus += ALIGN_BONUS;
    bonusHtml = `<div class="bonus">✓ <b>Your call matched the analysts' consensus.</b> The board's confidence steadies.</div>`; }
  else if(elapsed>DITHER_SECS){ bonus -= DITHER_PEN;
    bonusHtml = `<div class="warn-box">⏳ You hesitated. In a crisis, indecision itself costs you the board's confidence.</div>`; }

  // survival = points for the answer's rank − the relentless grind + the bonus
  const survDelta = RANK_POINTS[rank] - EROSION + bonus;
  S.survival = clamp(S.survival + survDelta);

  // bookkeeping
  if(ch.set){ ch.set.forEach(f=>S.flags[f]=true); }
  S.histTotal++; if(ch.hist) S.histMatch++;
  S.log.push({title:sc.title, year:sc.year, choice:ch.label, hist:!!ch.hist, fx, rank});
  scheduleEcho(sc, fx);

  // two-consecutive-WORST rule
  let streakWarn = "";
  if(isWorst){ S.worstStreak++; } else { S.worstStreak = 0; }

  // loss conditions
  const deadK = DATA[S.co].kpis.find(k=>S.kpi[k.key] <= 0);
  if(S.survival<=0){ S.over=true; S.overReason="survival"; }
  else if(deadK){ S.over=true; S.overReason="kpi"; S.overDeadK=deadK.label; }
  else if(S.worstStreak>=2){ S.over=true; S.overReason="streak"; }
  else if(isWorst){ streakWarn = `<div class="warn-box">⚠ The board is alarmed by that one. <b>Another worst-of-three call and you are gone.</b></div>`; }

  const reacts = genReactions(fx);
  app.innerHTML = hud() + `
    <div class="card">
      <div class="yr">${sc.year} · ${sc.title}</div>
      <div class="res">
        <div class="react">${reacts.map(r=>`<p class="${r.cls}">${r.text}</p>`).join("")||"<p>The world barely stirs.</p>"}</div>
        <div class="body">${ch.result}</div>
        ${rankHtml}${bonusHtml}${consHtml}${streakWarn}
      </div>
      ${S.over
        ? `<button class="btn bad" onclick="gameOver()">Face the board →</button>`
        : `<button class="btn v" onclick="advance()">Continue →</button>`}
    </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

function scheduleEcho(sc, fx){
  const keys = Object.keys(fx); if(!keys.length) return;
  const dom = keys.reduce((a,b)=>Math.abs(fx[b])>Math.abs(fx[a])?b:a);
  if(!fx[dom]) return;
  const good = fx[dom] > 0;
  const lines = good
    ? [`Five years on, the seed you planted in ${sc.year} bears fruit. The patient are rewarded.`,
       `History is beginning to vindicate your ${sc.year} move, Chief Executive. The doubters have gone quiet.`,
       `What you chose in ${sc.year} has taken root. You harvest it now.`]
    : [`The ${sc.year} debt comes due, Chief Executive. The bill, deferred, has arrived. Nothing is forgotten.`,
       `That ${sc.year} choice casts its shadow forward, as I warned it might.`,
       `Whispers grow that the ${sc.year} move was the wrong one. They may be right.`];
  S.pending.push({ due:S.histTotal+2, text:pick(lines) });
}

function ending(){
  const c = DATA[S.co], e = c.eras.future, cs = CASE[S.co];
  const delta = {}; c.kpis.forEach(k=>delta[k.key]=S.kpi[k.key]-S.start[k.key]);
  const align = S.histTotal ? Math.round(S.histMatch/S.histTotal*100) : 0;
  const surv = Math.round(S.survival);
  console.log("[analytics] survival", surv, "consensus", align+"%");   // hidden from player

  const order = [...c.kpis].sort((a,b)=>delta[b.key]-delta[a.key]);
  const achievement = cs.win[order[0].key];
  const mistake = cs.loss[order[order.length-1].key];

  let pivotal=null, max=-1;
  for(const l of S.log){ if(l.year==="SYNERGY") continue;
    const m = c.kpis.reduce((s,k)=>s+Math.abs(l.fx[k.key]||0),0);
    if(m>max){ max=m; pivotal=l; } }
  const debate = cs.debate + (pivotal?` — and above all, your ${pivotal.year} decision to ${shorten(pivotal.choice)}`:"");

  // verdict keyed on SURVIVAL (the meter that decided your fate), not a hidden score
  let icon, stamp, legacy;
  if(surv>=72){ icon="🏆"; stamp="A Landmark Tenure"; legacy=c.legendary; }
  else if(surv>=52){ icon="🎖"; stamp="A Successful Tenure"; legacy=`Against the odds, you left ${c.name} stronger than you found it — a record any board would re-sign.`; }
  else if(surv>=32){ icon="⚖"; stamp="A Contested Tenure"; legacy=`You survived to 2038 by your fingertips. History will argue whether you were bold enough, or simply lucky.`; }
  else{ icon="🩹"; stamp="A Bruised Survival"; legacy=`You reached the finish, barely, with the board's hand on your shoulder the whole way. The company endures, diminished but alive.`; }

  const approach = align>=75 ? "You governed by consensus, trusting the analysts' path almost every time."
    : align<=30 ? "You governed as a contrarian — defying the expected path again and again, and, against the odds, surviving it."
    : "You governed by instinct, mixing the expected move with the audacious one.";

  const ledger = S.log.map(l=>{
    const fxs = c.kpis.map(k=>{ const d=l.fx[k.key]; return d?`<span class="${d>0?'pos':'neg'}">${k.label} ${d>0?'+':''}${d}</span>`:`<span class="neu">${k.label} —</span>`; }).join("");
    const tagc = l.year==="SYNERGY" ? "var(--ice)" : (l.hist?"var(--gold)":"var(--ice)");
    const tagt = l.year==="SYNERGY" ? "synergy" : (l.hist?"consensus":"your road");
    return `<div class="row"><div class="t"><b>${l.year} — ${l.title}</b> <span style="color:${tagc};font-size:.76rem">· ${tagt}</span></div>
      <div class="c">${l.choice}</div><div class="fx">${fxs}</div></div>`;
  }).join("");

  app.innerHTML = `
    <div class="end">
      <div class="icon">${icon}</div>
      <div class="stamp">Harvard Business School · Case Study</div>
      <h2>${c.name}</h2>
      <div class="tag">${c.logo} ${e.name} · 2027–2038 · ${stamp} · survived at ${surv}%</div>
      <div class="case">
        <div class="sec"><div class="lbl">Your greatest achievement</div><div class="val">${cap(achievement)}.</div></div>
        <div class="sec"><div class="lbl">Your biggest mistake</div><div class="val">${cap(mistake)}.</div></div>
        <div class="sec"><div class="lbl">Historians still debate</div><div class="val">${cap(debate)}.</div></div>
        <div class="sec"><div class="lbl">Your style in the chair</div><div class="val">${approach}</div></div>
        <div class="sec"><div class="lbl">Legacy</div><div class="val">${legacy}</div></div>
      </div>
      <div class="oracle" style="margin-top:20px;padding:20px 18px">
        <div class="eye">🔮</div>
        <div class="says">"You survived the fog, Chief Executive. Few do. History has reached its verdict; I merely read it aloud."</div>
      </div>
      <div class="ledger"><div class="lh">⏳ The fog lifts — every decision, and what it truly cost or won</div>${ledger}</div>
      <div class="foot">
        <button class="btn v" onclick="startFuture('${S.co}')">↻ Replay the Future</button>
        <button class="btn ghost" onclick="oracle('${S.co}')">← The Oracle</button>
        <button class="btn ghost" onclick="titleScreen()">⌂ New company</button>
      </div>
    </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

titleScreen();
</script>
</body>
</html>
